name: MEP Standalone Issue AutoLoop (Dual: SYSTEM/BUSINESS) [SEALED]
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to build artifacts for"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string
  issues:
    types: [opened, edited, labeled]
permissions:
  contents: read
  issues: write
jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy entry and point to canonical workflow
        uses: actions/github-script@v7
        with:
          script: |
            const payloadIssue = context.payload.issue?.number;
            const inputIssue = Number(core.getInput('issue_number') || "0");
            const issue = payloadIssue || (Number.isFinite(inputIssue) && inputIssue > 0 ? inputIssue : 0);
            const canonical = '.github/workflows/mep_standalone_autoloop_dispatch.yml';
            const body = [
              '[MEP][SEALED] Legacy standalone entry is sealed.',
              '',
              '- Canonical workflow: ' + canonical,
              '- Run with workflow_dispatch inputs: issue_number (+ optional lane)',
              '- Lane rule: explicit lane OR labels (mep-biz/mep-system).',
              '- Unknown lane is STOP_HARD (no implicit SYSTEM fallback).'
            ].join('\n');
            if (issue > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue,
                body,
              });
            }
            core.setFailed('SEALED_WORKFLOW: use mep_standalone_autoloop_dispatch.yml');
