name: MEP Dispatch (from Issue) [G0-min AutoLoop Only]
on:
  issues:
    types: [labeled, edited]
permissions:
  actions: write
  contents: read
  issues: write
concurrency:
  group: mep-g0min-${{ github.event.issue.number }}
  cancel-in-progress: false
jobs:
  autoloop:
    if: contains(github.event.issue.labels.*.name, 'mep-dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch standalone issue autoloop
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh workflow run ".github/workflows/mep_standalone_issue_autoloop.yml" -f issue_number="${ISSUE_NUMBER}"

      - name: Comment bridge evidence
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="[MEP][DISPATCH_BRIDGE] PASS\n\n- issue: #${ISSUE_NUMBER}\n- target_workflow: .github/workflows/mep_standalone_issue_autoloop.yml\n- run: ${run_url}\n\nRUN_ID=DISPATCH_BRIDGE\nOUTCOME=PASS\nREASON_CODE=DISPATCHED_STANDALONE_AUTOLOOP\nNEXT_ACTION=WAIT_STANDALONE_AUTOLOOP"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" -f body="${body}" >/dev/null
