# registry-refresh: FIX_ISSUEOPS_GIT_IDENTITY_AND_CONTENTS_WRITE
name: MEP IssueOps Run (Issue Comment)
on:
  issue_comment:
    types: [created]
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
jobs:
  run:
    if: contains(github.event.comment.body, '/mep run')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MEP_PR_TOKEN || github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Configure git identity (required for commit)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "mep-issueops"
          git config user.email "mep-issueops@users.noreply.github.com"
      - name: Run IssueOps
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          GH_REPO:  ${{ github.repository }}
          GIT_AUTHOR_NAME: "mep-issueops"
          GIT_AUTHOR_EMAIL: "mep-issueops@users.noreply.github.com"
          GIT_COMMITTER_NAME: "mep-issueops"
          GIT_COMMITTER_EMAIL: "mep-issueops@users.noreply.github.com"
        run: |
          set -euo pipefail
          python tools/agent/issueops.py

      - name: Dispatch Gate0 (Audit/Compile/Dispatch)
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          echo "Dispatching Gate0 for issue #${ISSUE_NUMBER}"
          gh workflow run .github/workflows/mep_gate0_audit_compile_dispatch.yml -f issue_number="${ISSUE_NUMBER}"
