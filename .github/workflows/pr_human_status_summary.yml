name: PR Human Status Summary

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to summarize"
        required: false
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - review_requested
      - review_request_removed
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  workflow_run:
    workflows:
      - Business Packet Guard (PR)
      - CI Guard - BOM Check
      - MEP Entry Gate (PR)
      - EVIDENCE_FOLLOW_GUARD
      - MEP Done Check
      - Text Integrity Guard (PR)
      - mep-required-checks-ci
      - mep_scope_fence_guard_pr
    types:
      - requested
      - in_progress
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  summarize:
    name: summarize
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = "";

            if (context.eventName === "workflow_dispatch") {
              prNumber = context.payload.inputs?.pr_number?.toString() || core.getInput("pr_number") || "";
            } else if (context.eventName === "pull_request" || context.eventName === "pull_request_review") {
              prNumber = context.payload.pull_request?.number?.toString() || "";
            } else if (context.eventName === "workflow_run") {
              const prs = context.payload.workflow_run?.pull_requests || [];
              const mainPr = prs.find((pr) => pr?.base?.ref === "main");
              prNumber = (mainPr || prs[0])?.number?.toString() || "";
            }

            core.setOutput("pr_number", prNumber);

            if (!prNumber) {
              core.notice("No PR context was resolved for this event.");
            }

      - name: Summarize human status
        if: steps.resolve.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(process.env.PR_NUMBER);
            const stickyMarker = "<!-- PR_HUMAN_STATUS_CODEX_REPAIR_PROMPT -->";
            const summaryRunUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const failureStates = new Set([
              "ACTION_REQUIRED",
              "CANCELLED",
              "ERROR",
              "FAILURE",
              "FAILED",
              "STALE",
              "TIMED_OUT",
            ]);
            const pendingStates = new Set([
              "",
              "EXPECTED",
              "IN_PROGRESS",
              "PENDING",
              "QUEUED",
              "REQUESTED",
              "WAITING",
            ]);
            const blockedMergeStates = new Set([
              "BEHIND",
              "BLOCKED",
              "DIRTY",
              "HAS_HOOKS",
            ]);

            const normalize = (value) => (value || "").toString().trim().toUpperCase();
            const isPendingState = (value) => pendingStates.has(normalize(value));
            const isFailureState = (value) => {
              const normalized = normalize(value);
              return failureStates.has(normalized) || (
                normalized !== "SUCCESS" &&
                !pendingStates.has(normalized)
              );
            };
            const fmt = (items) => items.length > 0 ? items.join(", ") : "none";
            const trimLine = (value, maxLength = 220) => {
              const singleLine = (value || "").toString().replace(/\s+/g, " ").trim();
              if (!singleLine) {
                return "";
              }
              if (singleLine.length <= maxLength) {
                return singleLine;
              }
              return `${singleLine.slice(0, maxLength - 3)}...`;
            };
            const unique = (items) => Array.from(new Set(items.filter(Boolean)));

            const query = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    number
                    url
                    state
                    mergedAt
                    isDraft
                    reviewDecision
                    mergeable
                    mergeStateStatus
                    baseRefName
                    statusCheckRollup {
                      contexts(first: 100) {
                        nodes {
                          __typename
                          ... on CheckRun {
                            name
                            status
                            conclusion
                            detailsUrl
                          }
                          ... on StatusContext {
                            context
                            state
                            targetUrl
                          }
                        }
                      }
                    }
                    reviews(last: 20) {
                      nodes {
                        state
                        body
                        url
                        submittedAt
                        author {
                          login
                        }
                      }
                    }
                  }
                }
              }
            `;

            const response = await github.graphql(query, {
              owner,
              repo,
              number: prNumber,
            });

            const pr = response?.repository?.pullRequest;
            if (!pr) {
              core.warning(`PR #${prNumber} was not found.`);
              await core.summary
                .addHeading("PR Human Status Summary")
                .addRaw(`PR #${prNumber} could not be resolved.\n`)
                .write();
              return;
            }

            let requiredChecks = [];
            let requiredSource = "docs/MEP/REQUIRED_CHECKS_SSOT.md";

            try {
              const content = await github.rest.repos.getContent({
                owner,
                repo,
                path: "docs/MEP/REQUIRED_CHECKS_SSOT.md",
                ref: pr.baseRefName,
              });

              if (!Array.isArray(content.data) && content.data.type === "file" && content.data.content) {
                const decoded = Buffer
                  .from(content.data.content, content.data.encoding || "base64")
                  .toString("utf8");
                requiredChecks = Array.from(
                  decoded.matchAll(/^\s*-\s*"([^"]+)"\s*$/gm),
                  (match) => match[1].trim()
                );
              }
            } catch (error) {
              requiredSource = "statusCheckRollup fallback";
              core.warning(`Required checks SSOT could not be loaded: ${error.message}`);
            }

            const nodes = pr.statusCheckRollup?.contexts?.nodes || [];
            const observed = new Map();

            for (const node of nodes) {
              if (!node) {
                continue;
              }

              if (node.__typename === "CheckRun" && node.name) {
                observed.set(node.name, {
                  kind: "CheckRun",
                  name: node.name,
                  state: normalize(node.conclusion || node.status),
                  url: node.detailsUrl || "",
                });
              } else if (node.__typename === "StatusContext" && node.context) {
                observed.set(node.context, {
                  kind: "StatusContext",
                  name: node.context,
                  state: normalize(node.state),
                  url: node.targetUrl || "",
                });
              }
            }

            if (requiredChecks.length === 0) {
              requiredChecks = Array.from(observed.keys()).sort();
            }

            const requiredFailing = [];
            const requiredPending = [];
            const requiredMissing = [];

            for (const name of requiredChecks) {
              const hit = observed.get(name);
              if (!hit) {
                requiredMissing.push(name);
                continue;
              }

              if (hit.state === "SUCCESS") {
                continue;
              }

              if (isPendingState(hit.state)) {
                requiredPending.push(hit);
                continue;
              }

              if (isFailureState(hit.state)) {
                requiredFailing.push(hit);
              }
            }

            const reviewDecision = normalize(pr.reviewDecision);
            const mergeable = normalize(pr.mergeable);
            const mergeStateStatus = normalize(pr.mergeStateStatus);
            const changesRequestedReviews = (pr.reviews?.nodes || [])
              .filter((review) => normalize(review?.state) === "CHANGES_REQUESTED")
              .sort((left, right) => new Date(left?.submittedAt || 0) - new Date(right?.submittedAt || 0))
              .map((review) => ({
                author: review?.author?.login ? `@${review.author.login}` : "reviewer",
                body: trimLine(review?.body || ""),
                url: review?.url || "",
              }));

            const hasPendingWork = (
              pr.isDraft === true ||
              reviewDecision === "REVIEW_REQUIRED" ||
              observed.size === 0 ||
              requiredPending.length > 0 ||
              requiredMissing.length > 0 ||
              mergeable === "UNKNOWN" ||
              mergeStateStatus === "UNKNOWN"
            );

            let humanState = "待機中";
            let humanReason = "checks in progress / pending";
            let humanAction = "まだ待機してください";

            if (reviewDecision === "CHANGES_REQUESTED") {
              humanState = "差し戻し";
              humanReason = "Changes requested";
              humanAction = "Codexに修正依頼してください";
            } else if (requiredFailing.length > 0) {
              humanState = "差し戻し";
              humanReason = "Required checks fail";
              humanAction = "Codexに修正依頼してください";
            } else if (hasPendingWork) {
              humanState = "待機中";
              humanReason = "checks in progress / pending";
              humanAction = "まだ待機してください";
            } else if (mergeable === "CONFLICTING" || blockedMergeStates.has(mergeStateStatus)) {
              humanState = "差し戻し";
              humanReason = "Merge blocked";
              humanAction = mergeStateStatus === "BEHIND"
                ? "main を反映して再確認してください"
                : "PR のブロック要因を解消してください";
            } else {
              humanState = "通過";
              humanReason = "checks pass";
              humanAction = "main反映へ進めてください";
            }

            const requiredFailingSummary = requiredFailing.map((check) => `${check.name} (${check.state || "UNKNOWN"})`);
            const requiredPendingSummary = requiredPending.map((check) => `${check.name} (${check.state || "PENDING"})`);
            const reviewSummary = changesRequestedReviews.map((review) => review.url ? `${review.author} (${review.url})` : review.author);

            const promptReasonLines = [];
            if (reviewDecision === "CHANGES_REQUESTED") {
              promptReasonLines.push("- Changes requested reviews are present.");
              for (const review of changesRequestedReviews.slice(-5)) {
                const snippet = review.body ? `: ${review.body}` : "";
                promptReasonLines.push(`- ${review.author}${snippet}`);
              }
            }
            if (requiredFailing.length > 0) {
              for (const check of requiredFailing) {
                promptReasonLines.push(`- Failing required check: ${check.name} (${check.state || "UNKNOWN"})`);
              }
            }
            if (requiredMissing.length > 0) {
              promptReasonLines.push(`- Missing required checks: ${requiredMissing.join(", ")}`);
            }
            if (humanReason === "Merge blocked" || mergeable === "CONFLICTING" || blockedMergeStates.has(mergeStateStatus)) {
              promptReasonLines.push(`- mergeable: ${mergeable || "UNKNOWN"}`);
              promptReasonLines.push(`- mergeStateStatus: ${mergeStateStatus || "UNKNOWN"}`);
            }
            if (promptReasonLines.length === 0) {
              promptReasonLines.push("- 詳細は関連URLを確認してください。");
            }

            const relatedUrlLines = unique([
              `PR: ${pr.url}`,
              ...changesRequestedReviews.slice(-5).map((review, index) => review.url ? `Changes requested review ${index + 1}: ${review.url}` : ""),
              ...requiredFailing.map((check) => check.url ? `Failing check ${check.name}: ${check.url}` : ""),
            ]).map((item) => `- ${item}`);

            const codexPrompt = [
              `PR #${pr.number} の差し戻し対応をお願いします。`,
              "",
              "現在の判定:",
              `- 状態: ${humanState}`,
              `- 差し戻し理由: ${humanReason}`,
              "",
              "根拠:",
              ...promptReasonLines,
              "",
              "関連URL:",
              ...(relatedUrlLines.length > 0 ? relatedUrlLines : [`- PR: ${pr.url}`]),
              "",
              "制約:",
              "- 既存の本体実装を壊さないこと",
              "- required checks、merge条件、本体制御の意味を変えないこと",
              "- 自動起動、自動修正、自動pushは追加しないこと",
              "- 差し戻し理由の解消に必要な最小修正に限定すること",
              "",
              "依頼:",
              "- 上記の差し戻し理由を解消する最小修正を提案・実装してください。",
              "- 必要なら関連 review / failing check の指摘に直接対応してください。",
            ].join("\n");

            const summaryLines = [
              "## PR Human Status Summary",
              "",
              "| 項目 | 内容 |",
              "| --- | --- |",
              `| 状態 | ${humanState} |`,
              `| 根拠 | ${humanReason} |`,
              `| 人間がやること | ${humanAction} |`,
              "",
              `- PR: #${pr.number} (${pr.url})`,
              `- reviewDecision: ${reviewDecision || "NONE"}`,
              `- mergeable: ${mergeable || "UNKNOWN"}`,
              `- mergeStateStatus: ${mergeStateStatus || "UNKNOWN"}`,
              `- mergedAt: ${pr.mergedAt || "not merged"}`,
              `- required checks source: ${requiredSource}`,
              `- required checks fail: ${fmt(requiredFailingSummary)}`,
              `- required checks pending: ${fmt(requiredPendingSummary)}`,
              `- required checks missing: ${fmt(requiredMissing)}`,
              `- changes requested reviews: ${fmt(reviewSummary)}`,
            ];

            if (humanState === "差し戻し") {
              summaryLines.push(
                "",
                "## Codex修正依頼文",
                "",
                "以下をそのままCodexへ貼り付けてください。",
                "",
                "```text",
                codexPrompt,
                "```"
              );
            }

            core.notice(`状態=${humanState} / 根拠=${humanReason} / 人間がやること=${humanAction}`);
            await core.summary.addRaw(summaryLines.join("\n")).write();

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const stickyComment = comments.find((comment) => {
                return (comment.user?.type === "Bot") && (comment.body || "").includes(stickyMarker);
              });

              if (humanState === "差し戻し") {
                const commentBody = [
                  stickyMarker,
                  "## Codex修正依頼文",
                  "",
                  "このブロックをそのまま Codex へ貼り付けてください。",
                  "",
                  "```text",
                  codexPrompt,
                  "```",
                  "",
                  "更新元:",
                  `- PR Human Status Summary: ${summaryRunUrl}`,
                  `- PR: ${pr.url}`,
                ].join("\n");

                if (stickyComment) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: stickyComment.id,
                    body: commentBody,
                  });
                  core.info(`Updated sticky Codex repair prompt comment: ${stickyComment.html_url}`);
                } else {
                  const created = await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: commentBody,
                  });
                  core.info(`Created sticky Codex repair prompt comment: ${created.data.html_url}`);
                }
              } else if (stickyComment) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: stickyComment.id,
                });
                core.info(`Deleted sticky Codex repair prompt comment: ${stickyComment.html_url}`);
              }
            } catch (error) {
              core.warning(`Sticky comment sync failed: ${error.message}`);
            }

      - name: No PR context
        if: steps.resolve.outputs.pr_number == ''
        shell: bash
        run: |
          {
            echo "## PR Human Status Summary"
            echo
            echo "This event had no PR context, so no human-facing PR summary was generated."
          } >> "${GITHUB_STEP_SUMMARY}"
