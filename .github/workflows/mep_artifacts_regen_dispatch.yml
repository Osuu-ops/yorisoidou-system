# registry-refresh: ARTIFACTS_REGEN_DISPATCH
name: MEP Artifacts Regen (Dispatch)
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to regenerate docs/MEP/ARTIFACTS/*/ISSUE_<N>/"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (affects where artifacts are written)"
        required: false
        default: "SYSTEM"
        type: string
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: mep-artifacts-regen-${{ inputs.issue_number }}
  cancel-in-progress: true
jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Build pseudo event.json from Issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          mkdir -p _tmp
          gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}" > _tmp/issue.json
          python - << 'PY'
import json, pathlib
issue = json.loads(pathlib.Path("_tmp/issue.json").read_text(encoding="utf-8"))
ev = {"issue": issue}
pathlib.Path("_tmp/event.json").write_text(json.dumps(ev, ensure_ascii=False), encoding="utf-8")
PY
          echo "GITHUB_EVENT_PATH=_tmp/event.json" >> "$GITHUB_ENV"
      - name: Generate artifacts (tools/issue_artifact_loop.py)
        env:
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GITHUB_EVENT_PATH: ${{ env.GITHUB_EVENT_PATH }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          python tools/issue_artifact_loop.py
      - name: Upload artifacts (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: MEP_ARTIFACTS_REGEN_ISSUE_${{ inputs.issue_number }}
          path: docs/MEP/ARTIFACTS/**/ISSUE_${{ inputs.issue_number }}/
      - name: Create PR to store artifacts in repo
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "MEP: regen artifacts ISSUE #${{ inputs.issue_number }}"
          title: "MEP: regen artifacts ISSUE #${{ inputs.issue_number }}"
          body: |
            Regenerated docs/MEP/ARTIFACTS/**/ISSUE_${{ inputs.issue_number }}/
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Artifact: MEP_ARTIFACTS_REGEN_ISSUE_${{ inputs.issue_number }}
          branch: auto/artifacts_regen_${{ inputs.issue_number }}_${{ github.run_id }}
          base: main
          add-paths: |
            docs/MEP/ARTIFACTS/
      - name: Auto-merge PR (gh)
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
          PR_NUM:   ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUM" --repo "$GH_REPO" --auto --squash
          for i in $(seq 1 180); do
            mergedAt=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json mergedAt -q .mergedAt || true)
            state=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json state -q .state || true)
            echo "state=$state mergedAt=$mergedAt"
            if [ "$mergedAt" != "null" ] && [ -n "$mergedAt" ]; then
              echo "MERGED"
              exit 0
            fi
            sleep 5
          done
          echo "::error::PR not merged yet"
          exit 1
      - name: Comment DONE (pointers)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          body=$'[MEP][ARTIFACTS_REGEN] DONE\n\n- Run: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"$'\n- Artifact: MEP_ARTIFACTS_REGEN_ISSUE_'"${ISSUE_NUMBER}"$'\n- Repo path: docs/MEP/ARTIFACTS/**/ISSUE_'"${ISSUE_NUMBER}"$'/\n\nNext:\n- Run Gate0 (Audit/Compile/Dispatch) for this issue.'
          gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}/comments" -f body="$body" >/dev/null