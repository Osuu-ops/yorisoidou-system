name: MEP Entry Exec NEXT_ACTION (Dispatch)
on:
  workflow_dispatch:
    inputs:
      run_once:
        description: "run once marker"
        required: false
        default: "true"
permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write
concurrency:
  group: mep-entry-exec-nextaction
  cancel-in-progress: false
jobs:
  exec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps (pyyaml)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml
      - name: Execute NEXT_ACTION via runner (status -> apply_safe -> merge_finish)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
import json, os, sys, importlib.util
from pathlib import Path
spec = importlib.util.spec_from_file_location("runner", "tools/runner/runner.py")
mod = importlib.util.module_from_spec(spec)
assert spec and spec.loader
spec.loader.exec_module(mod)
p = Path("mep/run_state.json")
if not p.exists():
  print("STOP_HARD: RUN_STATE_MISSING", file=sys.stderr)
  sys.exit(1)
rs = json.loads(p.read_text(encoding="utf-8"))
next_action = str(rs.get("next_action") or "")
run_id = str(rs.get("run_id") or "")
os.environ["GH_REPO"] = os.environ.get("GH_REPO") or os.environ.get("GITHUB_REPOSITORY","")
print(f"[runner] before: next_action={next_action} run_id={run_id}")
# refresh compiled views + ack packet
mod.status()
rs = json.loads(p.read_text(encoding="utf-8"))
next_action = str(rs.get("next_action") or "")
run_id = str(rs.get("run_id") or "")
print(f"[runner] after status: next_action={next_action} run_id={run_id}")
if next_action == "READY_TO_APPLY_SAFE_PATH":
  if not run_id:
    print("STOP_HARD: RUN_ID_MISSING", file=sys.stderr)
    sys.exit(1)
  rc = mod.apply_safe(run_id)
  print(f"[runner] apply_safe rc={rc}")
  if rc not in (0,2):
    sys.exit(rc)
  rs = json.loads(p.read_text(encoding="utf-8"))
  run_id = str(rs.get("run_id") or "")
  rc2 = mod.merge_finish(run_id)
  print(f"[runner] merge_finish rc={rc2}")
  if rc2 not in (0,2):
    sys.exit(rc2)
print("[runner] done")
PY
      - name: Dispatch Gate8 (Writeback Bundle Entry)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/actions/workflows/mep_writeback_bundle_dispatch_entry.yml/dispatches" \
            -d '{"ref":"main","inputs":{"pr_number":"0","write_handoff":"true"}}'
