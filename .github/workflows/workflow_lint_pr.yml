name: workflow-lint
on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: actionlint (changed workflow files only)
        shell: bash
        run: |
          set -euo pipefail
          files=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
            && [ -n "${{ github.event.pull_request.base.sha }}" ] \
            && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          else
            mapfile -t files < <(git diff --name-only HEAD~1..HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow file changes to lint"
            exit 0
          fi

          printf 'Lint targets:\n%s\n' "${files[*]}"
          actionlint "${files[@]}"
