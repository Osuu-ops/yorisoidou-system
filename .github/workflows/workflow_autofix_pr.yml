name: workflow-autofix
on:
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  lint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect changed workflow lint targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          files=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
            && [ -n "${{ github.event.pull_request.base.sha }}" ] \
            && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          else
            mapfile -t files < <(git diff --name-only HEAD~1..HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow file changes to lint"
            echo "args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          lint_targets=()
          for f in "${files[@]}"; do
            if [ -f "${f}" ]; then
              lint_targets+=("${f}")
            fi
          done

          if [ "${#lint_targets[@]}" -eq 0 ]; then
            echo "No existing changed workflow files to lint"
            echo "args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Lint targets:\n%s\n' "${lint_targets[*]}"
          args="${lint_targets[*]}"
          echo "args=${args}" >> "$GITHUB_OUTPUT"
      - name: actionlint (changed workflow files only)
        id: lint
        if: steps.targets.outputs.args != ''
        uses: rhysd/actionlint@v1.7.8
        with:
          args: ${{ steps.targets.outputs.args }}
      - name: actionlint (changed workflow files only)
        if: steps.targets.outputs.args == ''
        shell: bash
        run: |
          echo "No existing changed workflow files to lint"
  autofix:
    name: autofix
    needs: [lint]
    if: always() && needs.lint.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Guard (avoid infinite loop)
        shell: bash
        run: |
          # Only run autofix once per PR head SHA
          # We use a PR label to mark "autofix-applied".
          echo "ok"
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply autofix (heredoc indent + LF normalize)
        shell: bash
        run: |
          python .github/scripts/autofix_workflows.py
          git status --porcelain
      - name: Commit & push if changed
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "NO_CHANGES"
            exit 0
          fi

          if [ "${HEAD_REPO}" != "${{ github.repository }}" ]; then
            echo "SKIP_PUSH_FORK_PR=${HEAD_REPO}"
            exit 0
          fi

          git config user.name  "mep-autofix"
          git config user.email "mep-autofix@users.noreply.github.com"
          git add .github/workflows
          git commit -m "ci: autofix workflows (heredoc indent)"

          if ! git pull --rebase origin "${HEAD_REF}"; then
            echo "REBASE_FAILED_SKIP_PUSH"
            exit 0
          fi

          if ! git push origin "HEAD:${HEAD_REF}"; then
            echo "PUSH_FAILED_SKIP"
            exit 0
          fi
