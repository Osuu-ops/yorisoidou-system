name: mep-merge-finish-outcome
on:
  pull_request:
    types: [closed]
permissions:
  issues: write
  pull-requests: write
  contents: read
concurrency:
  group: mep-merge-finish-outcome-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  merge-finish:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: "Guard: only IssueOps intake PRs"
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$HEAD_REF" != mep/issueops-run-* ]]; then
            echo "skip: head ref not intake ($HEAD_REF)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$TITLE" != chore(mep):\ IssueOps\ intake* ]]; then
            echo "note: title not typical intake ($TITLE) but head_ref matches; continue"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: "Merge-finish: post OUTCOME to Issue (best-effort)"
        if: ${{ steps.guard.outputs.skip == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail
          # Fetch PR body/title and try to extract ISSUE_NUMBER.
          pr_json="$(gh api "repos/${REPO}/pulls/${PR_NUM}")"
          title="$(printf '%s' "$pr_json" | python - <<'PY'
          import json,sys
          d=json.load(sys.stdin)
          print(d.get("title",""))
          PY
          )"
          body="$(printf '%s' "$pr_json" | python - <<'PY'
          import json,sys
          d=json.load(sys.stdin)
          print(d.get("body","") or "")
          PY
          )"
          # Heuristics: "Issue #1234" or "ISSUE_NUMBER: 1234" or "issue_number: 1234"
          issue=""
          issue="$(printf '%s\n%s\n' "$title" "$body" | python - <<'PY'
          import re,sys
          s=sys.stdin.read()
          m=re.search(r'\bIssue\s*#\s*(\d+)\b', s, re.IGNORECASE)
          if not m:
            m=re.search(r'^\s*ISSUE_NUMBER:\s*(\d+)\s*$', s, re.MULTILINE)
          if not m:
            m=re.search(r'^\s*issue_number:\s*(\d+)\s*$', s, re.MULTILINE)
          print(m.group(1) if m else "")
          PY
          )"
          if [[ -z "$issue" ]]; then
            # Could not map to issue; leave evidence on PR and exit 0.
            gh api "repos/${REPO}/issues/${PR_NUM}/comments" -f body="[MEP][MERGE_FINISH] merged intake PR but ISSUE_NUMBER not found. PR=${PR_URL} MERGE_SHA=${MERGE_SHA}" >/dev/null || true
            exit 0
          fi
          msg="$(cat <<MSG
          RUN_ID=MERGE_FINISH
          OUTCOME=PASS
          REASON_CODE=MERGE_FINISH_OK
          NEXT_ACTION=RESTART_PACKET
          PR_URL=${PR_URL}
          MERGE_SHA=${MERGE_SHA}
          EVIDENCE=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MSG
          )"
          gh api "repos/${REPO}/issues/${issue}/comments" -f body="$msg" >/dev/null || true
