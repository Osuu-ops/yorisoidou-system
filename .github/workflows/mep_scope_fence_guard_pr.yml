name: mep_scope_fence_guard_pr
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  scope-fence:
    runs-on: ubuntu-latest
    steps:
      - name: Controller Lock (label required)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name || "");
            const ok = labels.some(n => n.startsWith("mep:controller="));
            if (!ok) {
              core.setFailed("PR_CONTROLLER_LOCK_MISSING: add label mep:controller=<CHAT_ID> (or chosen controller id) before merge.");
            }      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard (diff to origin/main)
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/mep_scope_fence_guard.ps1 -Mode diff -BaseRef origin/main
