name: MEP Dispatch (from Issue) [SEALED]
on:
  issues:
    types: [labeled, edited]
permissions:
  contents: read
  issues: write
jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy issue-dispatch entry and point to canonical workflow
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue?.number;
            const canonical = '.github/workflows/mep_standalone_autoloop_dispatch.yml';
            const body = [
              '[MEP][SEALED] Legacy issue-dispatch entry is sealed.',
              '',
              '- Canonical workflow: ' + canonical,
              '- Use workflow_dispatch with: issue_number (+ optional lane)',
              '- Lane rule: explicit lane OR labels (mep-biz/mep-system).',
              '- Unknown lane is STOP_HARD (no implicit SYSTEM fallback).'
            ].join('\n');
            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue,
                body,
              });
            }
            core.setFailed('SEALED_WORKFLOW: use mep_standalone_autoloop_dispatch.yml');
