name: OP-1 Evidence Writeback (Dispatch Entry)
on:
  workflow_dispatch:
    inputs:
      controller_label:
        description: "controller lock label"
        required: true
      expected_controller_label:
        description: "exact expected label"
        required: false
        default: ""
permissions:
  actions: write
  contents: read
jobs:
  trigger_op1_target:
    runs-on: ubuntu-latest
    steps:
      - name: Validate controller lock
        shell: bash
        run: |
          set -euo pipefail
          LABEL='${{ inputs.controller_label }}'
          EXPECT='${{ inputs.expected_controller_label }}'
          [[ "${LABEL}" =~ ^mep:controller=CHAT_[A-Za-z0-9_]+$ ]] || { echo "STOP_HARD: PR_CONTROLLER_LOCK_INVALID"; exit 1; }
          if [ -n "${EXPECT}" ] && [ "${LABEL}" != "${EXPECT}" ]; then
            echo "STOP_HARD: PR_CONTROLLER_LOCK_MISMATCH"
            exit 1
          fi
      - name: Trigger OP-1 target workflow
        env:
          GH_TOKEN: ${{ secrets.MEP_BOT_PAT }}
        run: |
          set -euo pipefail
          gh workflow run mep_evidence_writeback_target_dispatch.yml -r main -f pr_number=0
