# registry-refresh: ARTIFACTS_REGEN_DISPATCH_V3
name: MEP Artifacts Regen (Dispatch V3) [SEALED]

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to regenerate docs/MEP/ARTIFACTS/*/ISSUE_<N>/"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS"
        required: false
        default: "SYSTEM"
        type: string

permissions:
  contents: read

jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy artifacts regen v3 entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '[MEP][SEALED] Legacy artifacts regen entry is sealed.',
              '',
              '- This workflow is a non-canonical path.',
              '- Do not use this entry for active main operations.',
              '- Inputs received: issue_number, lane.'
            ].join('\n');
            await core.summary
              .addHeading('SEALED_WORKFLOW')
              .addRaw(body, true)
              .write();
            core.setFailed('SEALED_WORKFLOW: legacy artifacts regen entry is sealed');
