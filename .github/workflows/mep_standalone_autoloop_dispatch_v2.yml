name: MEP Standalone AutoLoop (Dispatch)

on:
  workflow_call:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string
    secrets:
      MEP_BOT_PAT:
        required: false
      MEP_PR_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: mep-standalone-dispatch-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  noop-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "NOOP: required PR check for standalone dispatch workflow"'

  build-artifacts:
    if: ${{ always() }}
    name: build-artifacts
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.inputs.issue_number }}
      REQUESTED_LANE: ${{ inputs.lane || github.event.inputs.lane || '' }}
      GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Noop for PR
        if: ${{ github.event_name == 'pull_request' }}
        run: 'echo "NOOP: required PR check for build-artifacts"'

      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'pull_request' }}

      - name: Validate issue input
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ISSUE_NUMBER:-}" || { echo "issue_number is required"; exit 1; }

      - name: Build pseudo event json (from issue)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _tmp
          gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}" > _tmp/issue.json
          python3 - <<'PY'
          import json, pathlib
          issue = json.loads(pathlib.Path('_tmp/issue.json').read_text(encoding='utf-8'))
          pathlib.Path('_tmp/event.json').write_text(json.dumps({'issue': issue}, ensure_ascii=False), encoding='utf-8')
          PY
          echo "EVENT_JSON=_tmp/event.json" >> "$GITHUB_ENV"

      - name: Resolve lane (strict, no implicit fallback)
        if: ${{ github.event_name != 'pull_request' }}
        id: lane
        shell: bash
        run: |
          set -euo pipefail
          lane_args=()
          if [ -n "${REQUESTED_LANE:-}" ]; then
            lane_args+=(--requested-lane "${REQUESTED_LANE}")
          fi
          lane="$(python3 tools/mep_resolve_lane.py --issue-json-path _tmp/issue.json "${lane_args[@]}")"
          echo "lane=${lane}" >> "$GITHUB_OUTPUT"
          echo "MEP_RESOLVED_LANE=${lane}" >> "$GITHUB_ENV"

      - name: Generate artifacts (SYSTEM/BUSINESS) from Issue
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_EVENT_PATH: ${{ env.EVENT_JSON }}
          MEP_REQUESTED_LANE: ${{ env.MEP_RESOLVED_LANE }}
          MEP_SOURCE_WORKFLOW: .github/workflows/mep_standalone_autoloop_dispatch_v2.yml
        run: python3 tools/issue_artifact_loop.py

      - name: Upload workflow artifacts
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: MEP_STANDALONE_ARTIFACTS_ISSUE_${{ env.ISSUE_NUMBER }}
          path: docs/MEP/ARTIFACTS/**/ISSUE_${{ env.ISSUE_NUMBER }}/

      - name: Create PR to store artifacts in repo
        if: ${{ github.event_name != 'pull_request' }}
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MEP_PR_TOKEN || github.token }}
          commit-message: "MEP: issue artifacts ISSUE #${{ env.ISSUE_NUMBER }}"
          title: "MEP: issue artifacts ISSUE #${{ env.ISSUE_NUMBER }}"
          body: |
            Standalone AutoLoop (Dispatch) generated artifacts.
            - Issue: #${{ env.ISSUE_NUMBER }}
            - Lane: ${{ env.MEP_RESOLVED_LANE }}
            - Download: Actions artifact "MEP_STANDALONE_ARTIFACTS_ISSUE_${{ env.ISSUE_NUMBER }}"
          branch: auto/standalone_dispatch_${{ env.ISSUE_NUMBER }}_${{ github.run_id }}
          base: main
          labels: |
            mep:controller=PC
          add-paths: |
            docs/MEP/ARTIFACTS/

      - name: Auto-merge artifacts PR with required-check enforcement
        if: ${{ github.event_name != 'pull_request' && steps.cpr.outputs.pull-request-number != '' }}
        id: merge
        shell: bash
        env:
          PR_NUM: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          stop_hard(){ echo "STOP_HARD REASON_CODE=$1"; exit 1; }
          stop_wait(){ echo "STOP_WAIT REASON_CODE=$1"; exit 1; }

          pr="${PR_NUM:-}"
          [ -n "${pr}" ] || stop_hard AUTO_PR_NOT_CREATED

          gh pr merge "${pr}" --repo "${GITHUB_REPOSITORY}" --squash --auto --delete-branch || stop_wait AUTO_PR_ENABLE_AUTOMERGE_FAILED

          deadline=$(( $(date +%s) + 1800 ))
          merged_at=""
          merge_sha=""
          pr_url=""

          while [ -z "${merged_at}" ]; do
            pr_json="$(gh pr view "${pr}" --repo "${GITHUB_REPOSITORY}" --json state,mergeStateStatus,mergedAt,isDraft,statusCheckRollup,url,mergeCommit)"
            pr_state="$(echo "${pr_json}" | jq -r '.state // "UNKNOWN"')"
            pr_merge="$(echo "${pr_json}" | jq -r '.mergeStateStatus // "UNKNOWN"')"
            merged_at="$(echo "${pr_json}" | jq -r '.mergedAt // ""')"
            is_draft="$(echo "${pr_json}" | jq -r '.isDraft // false')"
            checks_total="$(echo "${pr_json}" | jq '.statusCheckRollup | length')"
            checks_failed="$(echo "${pr_json}" | jq '[.statusCheckRollup[]? | select((((.conclusion // .state // .status // "") | ascii_upcase) | test("FAILURE|FAILED|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED")))] | length')"
            pr_url="$(echo "${pr_json}" | jq -r '.url // ""')"
            merge_sha="$(echo "${pr_json}" | jq -r '.mergeCommit.oid // ""')"

            [ "${is_draft}" != "true" ] || stop_wait AUTO_PR_IS_DRAFT
            if [ "${checks_total}" -le 0 ]; then
              [ "$(date +%s)" -lt "${deadline}" ] || stop_hard AUTO_PR_CHECKS_MISSING
              sleep 20
              continue
            fi
            [ "${checks_failed}" -eq 0 ] || stop_hard AUTO_PR_CHECKS_FAILED

            if [ -n "${merged_at}" ]; then
              break
            fi

            [ "${pr_state}" = "OPEN" ] || stop_hard AUTO_PR_CLOSED_WITHOUT_MERGE
            if [ "${pr_merge}" = "BEHIND" ]; then
              gh api -X PUT "repos/${GITHUB_REPOSITORY}/pulls/${pr}/update-branch" >/dev/null || stop_wait AUTO_PR_UPDATE_BRANCH_FAILED
              sleep 10
              continue
            fi
            [ "$(date +%s)" -lt "${deadline}" ] || stop_wait AUTO_PR_MERGE_TIMEOUT
            sleep 20
          done

          echo "pr_number=${pr}" >> "${GITHUB_OUTPUT}"
          echo "pr_url=${pr_url}" >> "${GITHUB_OUTPUT}"
          echo "merge_commit_sha=${merge_sha}" >> "${GITHUB_OUTPUT}"
          echo "merged_at=${merged_at}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch Gate0 on merged artifact packet
        if: ${{ github.event_name != 'pull_request' && steps.merge.outputs.pr_number != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          LANE: ${{ env.MEP_RESOLVED_LANE }}
        run: |
          set -euo pipefail
          gh workflow run ".github/workflows/mep_gate0_audit_compile_dispatch.yml" --ref main \
            -f issue_number="${ISSUE_NUMBER}" \
            -f lane="${LANE}"

      - name: Comment pass evidence (machine-readable)
        if: ${{ github.event_name != 'pull_request' && steps.merge.outputs.pr_number != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          LANE: ${{ env.MEP_RESOLVED_LANE }}
          PACKET_PATH: docs/MEP/ARTIFACTS/${{ env.MEP_RESOLVED_LANE }}/ISSUE_${{ env.ISSUE_NUMBER }}/INPUT_PACKET.md
          PR_URL: ${{ steps.merge.outputs.pr_url }}
          PR_NUMBER: ${{ steps.merge.outputs.pr_number }}
          MERGE_COMMIT_SHA: ${{ steps.merge.outputs.merge_commit_sha }}
          MERGED_AT: ${{ steps.merge.outputs.merged_at }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="[MEP][STANDALONE_AUTOLOOP] PASS\n\n- issue: #${ISSUE_NUMBER}\n- lane: ${LANE}\n- packet_path: ${PACKET_PATH}\n- artifact_pr: #${PR_NUMBER}\n- artifact_pr_url: ${PR_URL}\n- merge_commit_sha: ${MERGE_COMMIT_SHA}\n- merged_at: ${MERGED_AT}\n- run: ${run_url}\n\nRUN_ID=STANDALONE_AUTOLOOP\nOUTCOME=PASS\nSTOP_CLASS=\nREASON_CODE=AUTOLOOP_ENTRY_DISPATCHED\nNEXT_ACTION=WAIT_8GATE\nISSUE_NUMBER=${ISSUE_NUMBER}\nLANE=${LANE}\nPACKET_PATH=${PACKET_PATH}\nPR_URL=${PR_URL}\nCOMMIT_SHA=${MERGE_COMMIT_SHA}\nWORKFLOW_RUN_URL=${run_url}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" -f body="${body}" >/dev/null

      - name: Bridge restart state into SSOT
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          ARTIFACT_PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          sys.path.insert(0, str(Path("tools").resolve()))
          from mep_restart_contract import build_restart_record, restart_bridge_from_record, restart_record_from_bridge

          issue_number = "${ISSUE_NUMBER}"
          standalone_run_id = "${GITHUB_RUN_ID}"
          standalone_run_url = "${GITHUB_RUN_URL}"
          artifact_pr_url = "${ARTIFACT_PR_URL}"

          resolved_lane = (os.environ.get("MEP_RESOLVED_LANE") or "").strip().upper()
          if resolved_lane not in ("SYSTEM", "BUSINESS"):
              raise SystemExit("STOP_HARD: lane unresolved in restart bridge")

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          artifact_dir = f"docs/MEP/ARTIFACTS/{resolved_lane}/ISSUE_{issue_number}/"
          packet_path = f"{artifact_dir}INPUT_PACKET.md"
          restart_packet_path = f"{artifact_dir}RESTART_PACKET.txt"

          run_state = Path("mep/run_state.json")
          rs = json.loads(run_state.read_text(encoding="utf-8")) if run_state.exists() else {}
          bridge = restart_record_from_bridge(rs.get("restart_bridge") or {})
          if bridge.get("source_run_id") == standalone_run_id and bridge.get("restart_packet_path") == restart_packet_path:
              print("RESTART_BRIDGE_NOOP=already_bridged")
              raise SystemExit(0)

          restart_record = build_restart_record(
              issue_number=issue_number,
              lane=resolved_lane,
              source_phase="STANDALONE_ARTIFACT",
              source_workflow=".github/workflows/mep_standalone_autoloop_dispatch_v2.yml",
              source_run_id=standalone_run_id,
              source_run_url=standalone_run_url,
              source_pr_url=artifact_pr_url,
              packet_path=packet_path,
              artifact_dir=artifact_dir,
              restart_packet_path=restart_packet_path,
              next_action="DISPATCH_8GATE_ENTRY",
              reason_code="STANDALONE_ARTIFACT_READY",
              generated_at_utc=now,
          )

          new_run_id = f"RUN_RESTART_{issue_number}_{standalone_run_id}"
          rs["run_id"] = new_run_id
          rs["run_status"] = "STILL_OPEN"
          rs["next_action"] = "BOOT"
          rs["updated_at"] = now

          lr = rs.get("last_result") or {}
          lr["stop_class"] = ""
          lr["reason_code"] = "RESTART_BRIDGE_READY"
          lr["next_action"] = "BOOT"
          lr["timestamp_utc"] = now
          lr["action"] = {"name": "RESTART_BRIDGE", "outcome": "OK"}
          lr["evidence"] = {
              "branch_name": f"auto/standalone_dispatch_{issue_number}_{standalone_run_id}",
              "pr_url": artifact_pr_url or None,
              "commit_sha": None,
              "workflow_run_url": standalone_run_url,
              "lane": resolved_lane,
              "packet_path": restart_record["packet_path"],
              "restart_packet": restart_record["restart_packet_path"],
          }
          rs["last_result"] = lr
          rs["restart_bridge"] = restart_bridge_from_record(restart_record)

          run_state.write_text(json.dumps(rs, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"RESTART_BRIDGE_RUN_ID={new_run_id}")
          print(f"RESTART_BRIDGE_NEXT_ACTION={restart_record['next_action']}")
          PY

      - name: Create PR to persist restart bridge SSOT
        if: ${{ github.event_name != 'pull_request' }}
        id: restart_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MEP_PR_TOKEN || github.token }}
          commit-message: "MEP: restart bridge ISSUE #${{ env.ISSUE_NUMBER }} run ${{ github.run_id }}"
          title: "MEP: restart bridge ISSUE #${{ env.ISSUE_NUMBER }}"
          body: |
            Restart bridge writeback after standalone dispatch completion.
            - Issue: #${{ env.ISSUE_NUMBER }}
            - Lane: ${{ env.MEP_RESOLVED_LANE }}
            - Standalone run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Artifact PR: ${{ steps.cpr.outputs.pull-request-url }}
          branch: mep/state-update/restart_${{ env.ISSUE_NUMBER }}_${{ github.run_id }}
          base: main
          labels: |
            mep:controller=PC
          add-paths: |
            mep/run_state.json

      - name: Enable auto-merge for restart bridge PR
        if: ${{ github.event_name != 'pull_request' && steps.restart_pr.outputs.pull-request-number != '' }}
        shell: bash
        env:
          PR_NUM: ${{ steps.restart_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUM" --squash --auto --delete-branch || true
          gh pr checks "$PR_NUM" --watch --required || true
