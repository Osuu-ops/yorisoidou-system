name: MEP Standalone AutoLoop (Dispatch)
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
permissions:
  contents: write
  issues: write
  pull-requests: write
concurrency:
  group: mep-standalone-dispatch-${{ inputs.issue_number }}
  cancel-in-progress: true
jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-merge artifacts PR (gh cli)
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          echo "PR_NUM=$PR_NUM"
          echo "GH_REPO=$GH_REPO"
          # request auto-merge (squash)
          gh pr merge "$PR_NUM" --repo "$GH_REPO" --auto --squash
          # wait until merged (max ~15 min)
          for i in $(seq 1 180); do
            mergedAt=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json mergedAt -q .mergedAt || true)
            state=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json state -q .state || true)
            echo "state=$state mergedAt=$mergedAt"
            if [ "$mergedAt" != "null" ] && [ -n "$mergedAt" ]; then
              echo "MERGED"
              exit 0
            fi
            sleep 5
          done
          echo "PR not merged yet (auto-merge waiting)."
          exit 1      - name: Comment "できました" with pointers
        uses: actions/github-script@v7
        with:
          script: |
            const issue = Number('${{ inputs.issue_number }}');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              "できました（Standalone AutoLoop / Dispatch）",
              "",
              `- Run: ${runUrl}`,
              `- Download: Actions Artifacts → MEP_STANDALONE_ARTIFACTS_ISSUE_${issue}`,
              `- Repo path (merged): docs/MEP/ARTIFACTS/<LANE>/ISSUE_${issue}/`,
              "",
              "出力（必須）:",
              "- AUDIT.md",
              "- MERGED_DRAFT.md（草案本文1つ）",
              "- INPUT_PACKET.md（8ゲート入口へ差し込み可能）",
              "- RUN_SUMMARY.md",
              "- RESTART_PACKET.txt"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue,
              body
            });


