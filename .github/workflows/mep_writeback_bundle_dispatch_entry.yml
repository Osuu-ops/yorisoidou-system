# reindex: force workflow registration refresh 2026-02-20T13:56:46Z
name: MEP Writeback Bundle (Entry)
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "0 = auto latest merged PR"
        required: false
        default: "0"
      ssot_b64:
        description: "SSOT payload as base64(UTF-8) (optional)"
        required: false
        default: ""
      ssot_payload_path:
        description: "Repo-relative path to SSOT payload file (optional)"
        required: false
        default: ""
      write_handoff:
        description: "write handoff files (optional)"
        required: false
        default: "false"
      controller_label:
        description: "controller lock label (mep:controller=CHAT_<ID>)"
        required: false
        default: ""
      expected_controller_label:
        description: "exact expected controller label (optional but recommended)"
        required: false
        default: ""
permissions:
  contents: write
  pull-requests: write
jobs:
  mep_emit_copypaste_zone:
    name: "MEP Emit Copypaste Zone"
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Emit MEP_COPYPASTE_ZONE
        shell: bash
        run: |
          echo "===== MEP_COPYPASTE_ZONE BEGIN ====="
          echo "RESTART_PACKET"
          echo "RUN_ID=${GITHUB_RUN_ID}"
          echo "TIMESTAMP=$(date -Iseconds)"
          echo "RUN_INTENT=EMIT_COPYPASTE_ZONE"
          echo "RUN_STATE_CODE=RUNNING"
          echo "MODE=CHECK"
          echo "NOW_WIP=EMIT_COPYPASTE_ZONE"
          echo "MICRO_POS=14/14"
          echo "ROUTE_SET_VERSION=RSV1"
          echo "MACRO_POS=NORMAL(0/0) RECHECK(0/0) RECOVERY(0/0)"
          echo "MACRO_PERCENT=0"
          echo "STABILITY=OK"
          echo "STOP_KIND="
          echo "STOP_REASON_CODE="
          echo "STOP_REASON="
          echo "NEXT_ACTION=PASTE_ZONE_TO_CHAT"
          echo "ENV_STATE_SNAPSHOT"
          echo "REPO_ORIGIN=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          echo "BRANCH=${GITHUB_REF_NAME}"
          echo "HEAD_SHA=${GITHUB_SHA}"
          echo "SSOT_VERSION=UNKNOWN"
          echo "WINDOW_RULE: NOW(-80,+160)"
          echo "ZONE_COMPLETE: YES"
          echo "===== MEP_COPYPASTE_ZONE END ====="
  writeback:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      
      - name: Gate8 RESTART_PACKET (DoD-min)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p .mep
          STOP_KIND=""
          STOP_REASON_CODE=""
          write_packet () {
            {
              echo "SSOT_VERSION=${SSOT_VERSION:-UNKNOWN}"
              echo "HEAD_SHA=${HEAD_SHA:-UNKNOWN}"
              echo "BUNDLE_VERSION=${BUNDLE_VERSION:-UNKNOWN}"
              echo "LAST_STOP_STATE=${LAST_STOP_STATE:-UNKNOWN}"
              echo "LAST_STOP_REASON=${LAST_STOP_REASON:-UNKNOWN}"
              echo "LAST_STOP_NEXT=${LAST_STOP_NEXT:-UNKNOWN}"
              echo "RESTART_KEY=${RESTART_KEY:-UNKNOWN}"
              echo "STOP_KIND=${STOP_KIND}"
              echo "STOP_REASON_CODE=${STOP_REASON_CODE}"
            } > .mep/RESTART_PACKET.txt
          }
          fail () {
            STOP_KIND="HARD"
            STOP_REASON_CODE="G8_RESTART_PACKET_FAILED"
            write_packet
          }
          trap 'fail; exit 1' ERR
          # SSOT_VERSION (best-effort)
          SSOT="docs/MEP/MEP_SSOT_MASTER.md"
          SSOT_VERSION="UNKNOWN"
          if [ -f "${SSOT}" ]; then
            v="$(grep -m1 -Eo 'v[0-9]+\.[0-9]+\.[0-9]+\+[^[:space:]]+' "${SSOT}" || true)"
            if [ -n "${v}" ]; then SSOT_VERSION="${v}"; fi
          fi
          # HEAD (required)
          HEAD_SHA="$(git rev-parse HEAD)"
          # BUNDLE_VERSION (best-effort)
          BUNDLE_VERSION="UNKNOWN"
          if [ -f "docs/MEP/MEP_BUNDLE.md" ]; then
            bv="$(grep -m1 -E '^\s*BUNDLE_VERSION\s*=\s*' docs/MEP/MEP_BUNDLE.md | sed -E 's/^\s*BUNDLE_VERSION\s*=\s*//')"
            if [ -n "${bv}" ]; then BUNDLE_VERSION="${bv}"; fi
          fi
          # LAST_STOP from mep/run_state.json (best-effort)
          LAST_STOP_STATE="UNKNOWN"
          LAST_STOP_REASON="UNKNOWN"
          LAST_STOP_NEXT="UNKNOWN"
          { if [ -f "mep/run_state.json" ]; then
              python -c 'import json; from pathlib import Path; rs=json.loads(Path("mep/run_state.json").read_text(encoding="utf-8")); run_status=str(rs.get("run_status","UNKNOWN") or "UNKNOWN"); lr=rs.get("last_result") or {}; reason=str(lr.get("reason_code","UNKNOWN") or "UNKNOWN"); nxt=str(rs.get("next_action","UNKNOWN") or "UNKNOWN"); print(run_status); print(reason); print(nxt)'
            fi
          } | {
            read -r s || true
            read -r r || true
            read -r n || true
            if [ -n "${s:-}" ]; then LAST_STOP_STATE="${s}"; fi
            if [ -n "${r:-}" ]; then LAST_STOP_REASON="${r}"; fi
            if [ -n "${n:-}" ]; then LAST_STOP_NEXT="${n}"; fi
          }
          # idempotency key (deterministic)
          RESTART_KEY="$(printf "%s\n%s\n%s\n%s\n%s\n%s\n" "${SSOT_VERSION}" "${HEAD_SHA}" "${BUNDLE_VERSION}" "${LAST_STOP_STATE}" "${LAST_STOP_REASON}" "${LAST_STOP_NEXT}" | sha256sum | awk '{print $1}')"
          write_packet
      - name: Upload RESTART_PACKET (Gate8)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restart-packet
          path: .mep/RESTART_PACKET.txt
          if-no-files-found: error

      - name: Load SSOT payload (b64 optional)
        shell: bash
        run: |
          set -euo pipefail
          SSOT_B64="${{ github.event.inputs.ssot_b64 }}"
          if [ -z "${SSOT_B64}" ]; then
            echo "MEP_SSOT_PAYLOAD_PATH=" >> "${GITHUB_ENV}"
            echo "MEP_SSOT_VERSION=UNKNOWN" >> "${GITHUB_ENV}"
            exit 0
          fi
          mkdir -p .mep_tmp
          SSOT_PATH=".mep_tmp/SSOT_PAYLOAD__${GITHUB_RUN_ID}.md"
          echo "${SSOT_B64}" | base64 -d > "${SSOT_PATH}"
          echo "MEP_SSOT_PAYLOAD_PATH=${SSOT_PATH}" >> "${GITHUB_ENV}"
          SSOT_HASH="$(sha256sum "${SSOT_PATH}" | awk '{print $1}')"
          echo "MEP_SSOT_VERSION=sha256:${SSOT_HASH}" >> "${GITHUB_ENV}"
          echo "[OK] SSOT restored: ${SSOT_PATH}"
      - name: Load SSOT payload (optional)
        shell: bash
        run: |
          set -euo pipefail
          SSOT_PATH_IN="${{ github.event.inputs.ssot_payload_path }}"
          if [ -z "${SSOT_PATH_IN}" ]; then
            echo "MEP_SSOT_PAYLOAD_PATH=" >> "${GITHUB_ENV}"
            echo "MEP_SSOT_VERSION=UNKNOWN" >> "${GITHUB_ENV}"
            exit 0
          fi
          if [ ! -f "${SSOT_PATH_IN}" ]; then
            echo "[NG] SSOT payload path not found: ${SSOT_PATH_IN}"
            exit 2
          fi
          echo "MEP_SSOT_PAYLOAD_PATH=${SSOT_PATH_IN}" >> "${GITHUB_ENV}"
          # sha256 for version stamp (portable on ubuntu runner)
          SSOT_HASH="$(sha256sum "${SSOT_PATH_IN}" | awk '{print $1}')"
          echo "MEP_SSOT_VERSION=sha256:${SSOT_HASH}" >> "${GITHUB_ENV}"
          echo "[OK] SSOT payload loaded: ${SSOT_PATH_IN}"

      - name: Configure git identity (required for writeback commit)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve PR number
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN }}
        run: |
          set -euo pipefail
          PR_IN="${{ github.event.inputs.pr_number }}"
          if [ -z "${PR_IN}" ]; then PR_IN="0"; fi
          if [ "${PR_IN}" = "0" ]; then
            PR_IN="$(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=closed&sort=updated&direction=desc&per_page=50" --jq '[.[] | select(.merged_at!=null and .base.ref=="main")][0].number')"
          fi
          if [ -z "${PR_IN}" ] || [ "${PR_IN}" = "null" ]; then
            echo "[NG] failed to resolve PR number"
            exit 2
          fi
          echo "PR_NUMBER=${PR_IN}" >> "${GITHUB_ENV}"
          echo "[OK] PR_NUMBER=${PR_IN}"
      - name: Bump Bundled version (parent)
        shell: pwsh
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: |
          pwsh -NoProfile -File ./tools/mep_bump_bundle_version.ps1 -BundlePath "docs/MEP/MEP_BUNDLE.md"
      - name: Append full evidence line into parent Bundled
        shell: pwsh
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN }}
        run: |
          pwsh -NoProfile -File ./tools/mep_append_evidence_line_full.ps1 -PrNumber ${{ env.PR_NUMBER }} -BundlePath "docs/MEP/MEP_BUNDLE.md"
      - name: Ensure writeback PR (helper)
        shell: pwsh
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN }}
          MEP_CONTROLLER_LABEL: ${{ github.event.inputs.controller_label }}
          MEP_EXPECTED_CONTROLLER_LABEL: ${{ github.event.inputs.expected_controller_label }}
        run: |
          pwsh -NoProfile -File ./tools/mep_fix_bundle_version_suffix_to_head.ps1 -BundlePath "docs/MEP/MEP_BUNDLE.md"
          pwsh -NoProfile -File ./tools/mep_writeback_create_pr.ps1 -BundlePath "docs/MEP/MEP_BUNDLE.md"



# ---- MEP: AI判断完結ゾーン出力（追記） ----
# registry-refresh: 20260212_111819

      - name: Upload Entry Outputs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mep_writeback_entry_outputs
          path: |
            docs/MEP/**
            docs/MEP_SUB/**
            .mep_tmp/**
            _engine_out/**
            _system_pack_out/**
          if-no-files-found: ignore

      - name: MEP Gate12 Health (always)
        if: always()
        shell: pwsh
        run: |
          ./tools/mep_health_generate.ps1 -RepoRoot . -OutDir docs/MEP_STATUS -RunState mep/run_state.json -Bundle docs/MEP/MEP_BUNDLE.md -SSOT docs/MEP/MEP_SSOT_MASTER.md
      - name: Upload MEP Health (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mep_health
          path: |
            docs/MEP_STATUS/mep_health.json
            docs/MEP_STATUS/mep_health.md
