name: MEP Auto PR Gate Dispatch (Full Auto via MIN) [SEALED]

on:
  workflow_dispatch:
    inputs:
      artifact_title:
        description: "Artifact title (short)"
        required: true
        type: string
      artifact_markdown:
        description: "Artifact body (markdown)"
        required: true
        type: string
      pr_body:
        description: "PR body"
        required: true
        type: string
      merge_if_ok:
        description: "Merge automatically if gate OK (true/false)"
        required: true
        default: "true"
        type: string

permissions:
  contents: read

jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy auto-pr-gate entry and point to canonical workflow
        uses: actions/github-script@v7
        with:
          script: |
            const canonical = '.github/workflows/mep_auto_pr_gate_dispatch.yml';
            const body = [
              '[MEP][SEALED] Legacy Auto PR Gate MIN entry is sealed.',
              '',
              '- Canonical workflow: ' + canonical,
              '- Use workflow_dispatch on the canonical entry.',
              '- Inputs remain: artifact_title, artifact_markdown, pr_body, merge_if_ok.'
            ].join('\n');
            await core.summary
              .addHeading('SEALED_WORKFLOW')
              .addRaw(body, true)
              .write();
            core.setFailed('SEALED_WORKFLOW: use mep_auto_pr_gate_dispatch.yml');
