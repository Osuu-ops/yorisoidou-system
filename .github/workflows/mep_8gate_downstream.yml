name: MEP 8-Gate Downstream

on:
  workflow_dispatch:
    inputs:
      packet_path:
        description: "Path to INPUT_PACKET.md"
        required: true
        type: string
      source_entry_run_id:
        description: "Source run id from mep_8gate_entry_filter"
        required: false
        default: ""
        type: string
      source_issue_number:
        description: "Issue number (optional override)"
        required: false
        default: ""
        type: string
      source_lane:
        description: "SYSTEM or BUSINESS (optional override)"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      packet_path:
        required: true
        type: string
      source_entry_run_id:
        required: false
        default: ""
        type: string
      source_issue_number:
        required: false
        default: ""
        type: string
      source_lane:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: mep-8gate-downstream-${{ inputs.packet_path }}
  cancel-in-progress: false

jobs:
  gate_chain:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.chain.outputs.issue_number }}
      lane: ${{ steps.chain.outputs.lane }}
      packet_path: ${{ steps.chain.outputs.packet_path }}
      pr_number: ${{ steps.chain.outputs.pr_number }}
      pr_url: ${{ steps.chain.outputs.pr_url }}
      merge_commit_sha: ${{ steps.chain.outputs.merge_commit_sha }}
      restart_packet_file: ${{ steps.chain.outputs.restart_packet_file }}
      cycle_evidence_file: ${{ steps.chain.outputs.cycle_evidence_file }}
      workflow_run_url: ${{ steps.chain.outputs.workflow_run_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Gate1..Gate8
        id: chain
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKET_PATH: ${{ inputs.packet_path }}
          SOURCE_ISSUE: ${{ inputs.source_issue_number }}
          SOURCE_LANE: ${{ inputs.source_lane }}
          SOURCE_ENTRY_RUN_ID: ${{ inputs.source_entry_run_id }}
        run: |
          set -euo pipefail
          stop_hard(){ echo "STOP_HARD REASON_CODE=$1"; exit 1; }
          stop_wait(){ echo "STOP_WAIT REASON_CODE=$1"; exit 1; }
          pass(){ echo "PASS REASON_CODE=$1"; }

          workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Gate1: packet validate
          [ -n "${PACKET_PATH:-}" ] || stop_hard G1_PACKET_PATH_MISSING
          [ -f "${PACKET_PATH}" ] || stop_hard G1_PACKET_NOT_FOUND
          python3 tools/validate_input_packet.py "${PACKET_PATH}" || stop_hard G1_PACKET_VALIDATION_FAILED
          issue="$(grep -m1 -E '^ISSUE_NUMBER:' "${PACKET_PATH}" | sed -E 's/^ISSUE_NUMBER:[[:space:]]*//;s/\r//g' || true)"
          lane="$(grep -m1 -E '^LANE:' "${PACKET_PATH}" | sed -E 's/^LANE:[[:space:]]*//;s/\r//g' || true)"
          [ -n "${issue}" ] || issue="${SOURCE_ISSUE:-}"
          [ -n "${lane}" ] || lane="${SOURCE_LANE:-}"
          [ -n "${issue}" ] || stop_hard G1_ISSUE_NUMBER_MISSING
          case "${lane}" in SYSTEM|BUSINESS) ;; *) stop_hard G1_LANE_INVALID ;; esac
          packet_sha="$(sha256sum "${PACKET_PATH}" | awk '{print $1}')"
          pass G1_PACKET_VALID

          # Gate2: PR checks truth
          commit_sha="$(git log -n1 --pretty=%H -- "${PACKET_PATH}" || true)"
          [ -n "${commit_sha}" ] || stop_wait G2_PACKET_COMMIT_NOT_FOUND
          prs_json="$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/commits/${commit_sha}/pulls" || true)"
          [ -n "${prs_json}" ] || stop_wait G2_ASSOCIATED_PR_QUERY_FAILED
          pr="$(echo "${prs_json}" | jq -r '[.[] | select(.base.ref=="main")] | sort_by(.number) | .[-1].number // empty')"
          [ -n "${pr}" ] || stop_wait G2_ASSOCIATED_PR_NOT_FOUND

          pr_json="$(gh pr view "${pr}" --repo "${GITHUB_REPOSITORY}" --json state,mergeStateStatus,mergedAt,isDraft,statusCheckRollup,url,mergeCommit)"
          pr_state="$(echo "${pr_json}" | jq -r '.state // "UNKNOWN"')"
          pr_merge="$(echo "${pr_json}" | jq -r '.mergeStateStatus // "UNKNOWN"')"
          merged_at="$(echo "${pr_json}" | jq -r '.mergedAt // ""')"
          is_draft="$(echo "${pr_json}" | jq -r '.isDraft // false')"
          checks_total="$(echo "${pr_json}" | jq '.statusCheckRollup | length')"
          checks_failed="$(echo "${pr_json}" | jq '[.statusCheckRollup[]? | select((((.conclusion // .state // .status // "") | ascii_upcase) | test("FAILURE|FAILED|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED")))] | length')"
          checks_pending="$(echo "${pr_json}" | jq '[.statusCheckRollup[]? | select((((.conclusion // .state // .status // "") | ascii_upcase) | test("PENDING|IN_PROGRESS|QUEUED|WAITING|REQUESTED|EXPECTED")))] | length')"
          pr_url="$(echo "${pr_json}" | jq -r '.url // ""')"
          merge_commit_sha="$(echo "${pr_json}" | jq -r '.mergeCommit.oid // ""')"

          [ "${is_draft}" != "true" ] || stop_wait G2_PR_IS_DRAFT
          [ "${checks_total}" -gt 0 ] || stop_hard G2_PR_CHECKS_MISSING
          [ "${checks_failed}" -eq 0 ] || stop_hard G2_PR_CHECKS_FAILED
          [ "${checks_pending}" -eq 0 ] || stop_wait G2_PR_CHECKS_PENDING
          pass G2_PR_CHECKS_PASS

          # Gate3: update-branch when behind
          if [ "${pr_state}" = "OPEN" ] && [ "${pr_merge}" = "BEHIND" ]; then
            gh api -X PUT "repos/${GITHUB_REPOSITORY}/pulls/${pr}/update-branch" >/dev/null || stop_wait G3_UPDATE_BRANCH_FAILED
            stop_wait G3_UPDATE_BRANCH_REQUESTED
          fi
          pass G3_NOT_BEHIND

          # Gate4: enable auto-merge for open PR
          if [ "${pr_state}" = "OPEN" ]; then
            gh pr merge "${pr}" --repo "${GITHUB_REPOSITORY}" --squash --auto --delete-branch || stop_wait G4_ENABLE_AUTOMERGE_FAILED
          fi
          pass G4_AUTOMERGE_ENABLED_OR_SKIP

          # Gate5: wait merged while checks stay green
          deadline=$(( $(date +%s) + 1200 ))
          while [ -z "${merged_at}" ]; do
            pr_json="$(gh pr view "${pr}" --repo "${GITHUB_REPOSITORY}" --json state,mergeStateStatus,mergedAt,statusCheckRollup,url,mergeCommit)"
            pr_state="$(echo "${pr_json}" | jq -r '.state // "UNKNOWN"')"
            pr_merge="$(echo "${pr_json}" | jq -r '.mergeStateStatus // "UNKNOWN"')"
            merged_at="$(echo "${pr_json}" | jq -r '.mergedAt // ""')"
            checks_total="$(echo "${pr_json}" | jq '.statusCheckRollup | length')"
            checks_failed="$(echo "${pr_json}" | jq '[.statusCheckRollup[]? | select((((.conclusion // .state // .status // "") | ascii_upcase) | test("FAILURE|FAILED|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED")))] | length')"
            pr_url="$(echo "${pr_json}" | jq -r '.url // ""')"
            merge_commit_sha="$(echo "${pr_json}" | jq -r '.mergeCommit.oid // ""')"

            [ "${checks_total}" -gt 0 ] || stop_hard G5_PR_CHECKS_MISSING
            [ "${checks_failed}" -eq 0 ] || stop_hard G5_PR_CHECKS_FAILED
            if [ -n "${merged_at}" ]; then
              break
            fi
            [ "${pr_state}" = "OPEN" ] || stop_hard G5_PR_CLOSED_WITHOUT_MERGE
            if [ "${pr_merge}" = "BEHIND" ]; then
              gh api -X PUT "repos/${GITHUB_REPOSITORY}/pulls/${pr}/update-branch" >/dev/null || stop_wait G5_UPDATE_BRANCH_FAILED
              stop_wait G5_UPDATE_BRANCH_REQUESTED
            fi
            [ "$(date +%s)" -lt "${deadline}" ] || stop_wait G5_MERGE_TIMEOUT
            sleep 20
          done
          pass G5_PR_MERGED

          # Gate6: verify merged packet on main
          git fetch origin main --prune
          git checkout --detach origin/main
          [ -f "${PACKET_PATH}" ] || stop_hard G6_PACKET_NOT_ON_MAIN
          main_sha="$(sha256sum "${PACKET_PATH}" | awk '{print $1}')"
          [ "${main_sha}" = "${packet_sha}" ] || stop_hard G6_PACKET_HASH_MISMATCH_ON_MAIN
          pass G6_MAIN_REFLECTED_PACKET

          # Gate7: evidence comment
          gate7_body="[MEP][8GATE] PASS\n\n- lane: ${lane}\n- issue: #${issue}\n- pr: #${pr}\n- pr_url: ${pr_url}\n- merge_commit_sha: ${merge_commit_sha}\n- merged_at: ${merged_at}\n- packet_path: ${PACKET_PATH}\n- run: ${workflow_run_url}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${issue}/comments" -f body="${gate7_body}" >/dev/null || stop_wait G7_EVIDENCE_COMMENT_FAILED
          pass G7_EVIDENCE_COMMENT_WRITTEN

          # Gate8: restart packet + cycle evidence
          mkdir -p .mep/restart
          restart_packet_file=".mep/restart/ISSUE_${issue}_RESTART_PACKET.txt"
          cycle_evidence_file=".mep/restart/ISSUE_${issue}_CYCLE_EVIDENCE.json"
          generated_at_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export issue lane pr pr_url merge_commit_sha merged_at SOURCE_ENTRY_RUN_ID workflow_run_url PACKET_PATH restart_packet_file cycle_evidence_file generated_at_utc GITHUB_RUN_ID
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("tools").resolve()))
          from mep_restart_contract import build_restart_record, render_restart_packet_text

          issue = os.environ["issue"]
          lane = os.environ["lane"]
          packet_path = os.environ["PACKET_PATH"]
          pr = os.environ["pr"]
          pr_url = os.environ["pr_url"]
          commit_sha = os.environ["merge_commit_sha"]
          merged_at = os.environ["merged_at"]
          source_entry_run_id = os.environ.get("SOURCE_ENTRY_RUN_ID", "")
          workflow_run_url = os.environ["workflow_run_url"]
          restart_packet_file = os.environ["restart_packet_file"]
          cycle_evidence_file = os.environ["cycle_evidence_file"]
          generated_at_utc = os.environ["generated_at_utc"]
          source_run_id = os.environ.get("GITHUB_RUN_ID", "")
          artifact_dir = f"docs/MEP/ARTIFACTS/{lane}/ISSUE_{issue}/"

          restart_record = build_restart_record(
              issue_number=issue,
              lane=lane,
              source_phase="GATE8_DOWNSTREAM",
              source_workflow=".github/workflows/mep_8gate_downstream.yml",
              source_run_id=source_run_id,
              source_run_url=workflow_run_url,
              source_pr_url=pr_url,
              packet_path=packet_path,
              artifact_dir=artifact_dir,
              restart_packet_path=restart_packet_file,
              next_action="RESTART_PACKET_READY",
              reason_code="G8_RESTART_PACKET_READY",
              generated_at_utc=generated_at_utc,
          )
          Path(restart_packet_file).write_text(render_restart_packet_text(restart_record), encoding="utf-8")
          cycle = {
              "run_id": "MEP_8GATE_CYCLE",
              "outcome": "PASS",
              "issue_number": issue,
              "lane": lane,
              "packet_path": packet_path,
              "pr_number": pr,
              "pr_url": pr_url,
              "commit_sha": commit_sha,
              "merged_at": merged_at,
              "source_entry_run_id": source_entry_run_id,
              "workflow_run_url": workflow_run_url,
              "restart_packet_file": restart_packet_file,
              "restart_contract": restart_record,
          }
          Path(cycle_evidence_file).write_text(json.dumps(cycle, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          pass G8_RESTART_PACKET_READY

          echo "issue_number=${issue}" >> "${GITHUB_OUTPUT}"
          echo "lane=${lane}" >> "${GITHUB_OUTPUT}"
          echo "packet_path=${PACKET_PATH}" >> "${GITHUB_OUTPUT}"
          echo "pr_number=${pr}" >> "${GITHUB_OUTPUT}"
          echo "pr_url=${pr_url}" >> "${GITHUB_OUTPUT}"
          echo "merge_commit_sha=${merge_commit_sha}" >> "${GITHUB_OUTPUT}"
          echo "restart_packet_file=${restart_packet_file}" >> "${GITHUB_OUTPUT}"
          echo "cycle_evidence_file=${cycle_evidence_file}" >> "${GITHUB_OUTPUT}"
          echo "workflow_run_url=${workflow_run_url}" >> "${GITHUB_OUTPUT}"

      - name: Upload restart packet artifact
        uses: actions/upload-artifact@v4
        with:
          name: mep_8gate_restart_packet_issue_${{ steps.chain.outputs.issue_number }}
          path: |
            ${{ steps.chain.outputs.restart_packet_file }}
            ${{ steps.chain.outputs.cycle_evidence_file }}
          if-no-files-found: error

  restart_packet:
    runs-on: ubuntu-latest
    needs: gate_chain
    steps:
      - name: Restart packet final evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.gate_chain.outputs.issue_number }}
          LANE: ${{ needs.gate_chain.outputs.lane }}
          PACKET_PATH: ${{ needs.gate_chain.outputs.packet_path }}
          PR_NUMBER: ${{ needs.gate_chain.outputs.pr_number }}
          PR_URL: ${{ needs.gate_chain.outputs.pr_url }}
          COMMIT_SHA: ${{ needs.gate_chain.outputs.merge_commit_sha }}
          RESTART_PACKET_PATH: ${{ needs.gate_chain.outputs.restart_packet_file }}
          RUN_URL: ${{ needs.gate_chain.outputs.workflow_run_url }}
        run: |
          set -euo pipefail
          mkdir -p _tmp
          python3 - <<'PY' > _tmp/restart_comment.txt
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          sys.path.insert(0, str(Path("tools").resolve()))
          from mep_restart_contract import build_restart_record, render_restart_packet_text

          generated_at_utc = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          record = build_restart_record(
              issue_number=os.environ["ISSUE_NUMBER"],
              lane=os.environ["LANE"],
              source_phase="GATE8_DOWNSTREAM",
              source_workflow=".github/workflows/mep_8gate_downstream.yml",
              source_run_id=os.environ.get("GITHUB_RUN_ID", ""),
              source_run_url=os.environ["RUN_URL"],
              source_pr_url=os.environ["PR_URL"],
              packet_path=os.environ["PACKET_PATH"],
              artifact_dir=f"docs/MEP/ARTIFACTS/{os.environ['LANE']}/ISSUE_{os.environ['ISSUE_NUMBER']}/",
              restart_packet_path=os.environ["RESTART_PACKET_PATH"],
              next_action="RESTART_PACKET_READY",
              reason_code="G8_RESTART_PACKET_READY",
              generated_at_utc=generated_at_utc,
          )
          summary = (
              "[MEP][8GATE][RESTART_PACKET] READY\n\n"
              f"- artifact: mep_8gate_restart_packet_issue_{os.environ['ISSUE_NUMBER']}\n"
              f"- lane: {os.environ['LANE']}\n"
              f"- pr: #{os.environ['PR_NUMBER']}\n"
              f"- pr_url: {os.environ['PR_URL']}\n"
              f"- commit_sha: {os.environ['COMMIT_SHA']}\n"
              f"- run: {os.environ['RUN_URL']}"
          )
          print(summary + "\n\n" + render_restart_packet_text(record).rstrip())
          PY
          body="$(cat _tmp/restart_comment.txt)"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" -f body="${body}" >/dev/null
          echo "PASS REASON_CODE=RESTART_PACKET_EMITTED"
