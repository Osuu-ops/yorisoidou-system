name: MEP Standalone AutoLoop (Dispatch)

on:
  workflow_call:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
    secrets:
      MEP_BOT_PAT:
        required: false
      MEP_PR_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: mep-standalone-dispatch-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  noop-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "NOOP: required PR check for standalone dispatch workflow"'

  build-artifacts:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ inputs.issue_number || github.event.inputs.issue_number }}
      GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate issue input
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ISSUE_NUMBER:-}" || { echo "issue_number is required"; exit 1; }

      - name: Build pseudo event json (from issue)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _tmp
          gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}" > _tmp/issue.json
          python3 - <<'PY'
          import json, pathlib
          issue = json.loads(pathlib.Path('_tmp/issue.json').read_text(encoding='utf-8'))
          pathlib.Path('_tmp/event.json').write_text(json.dumps({'issue': issue}, ensure_ascii=False), encoding='utf-8')
          PY
          echo "EVENT_JSON=_tmp/event.json" >> "$GITHUB_ENV"

      - name: Generate artifacts (SYSTEM/BUSINESS) from Issue
        env:
          GITHUB_EVENT_PATH: ${{ env.EVENT_JSON }}
        run: python3 tools/issue_artifact_loop.py

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MEP_STANDALONE_ARTIFACTS_ISSUE_${{ env.ISSUE_NUMBER }}
          path: docs/MEP/ARTIFACTS/**/ISSUE_${{ env.ISSUE_NUMBER }}/

      - name: Create PR to store artifacts in repo
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MEP_PR_TOKEN || github.token }}
          commit-message: "MEP: issue artifacts ISSUE #${{ env.ISSUE_NUMBER }}"
          title: "MEP: issue artifacts ISSUE #${{ env.ISSUE_NUMBER }}"
          body: |
            Standalone AutoLoop (Dispatch) generated artifacts.
            - Issue: #${{ env.ISSUE_NUMBER }}
            - Download: Actions artifact "MEP_STANDALONE_ARTIFACTS_ISSUE_${{ env.ISSUE_NUMBER }}"
          branch: auto/standalone_dispatch_${{ env.ISSUE_NUMBER }}_${{ github.run_id }}
          base: main
          add-paths: |
            docs/MEP/ARTIFACTS/

      - name: Enable auto-merge for artifacts PR
        if: steps.cpr.outputs.pull-request-number != ''
        shell: bash
        env:
          PR_NUM: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUM" --squash --auto --delete-branch || true
          gh pr checks "$PR_NUM" --watch --required || true
