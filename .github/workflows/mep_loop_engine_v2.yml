name: MEP Loop Engine (Canonical v2 / phase3 writeback)
run-name: MEP Loop Engine / iter ${{ inputs.iter }} / max ${{ inputs.max_iter }} / token ${{ inputs.resume_token || 'none' }}
"on":
  workflow_dispatch:
    inputs:
      iter:
        description: "current iteration (1..)"
        required: false
        default: "1"
      max_iter:
        description: "max iterations (hard stop). default 50"
        required: false
        default: "50"
      sleep_seconds:
        description: "throttle seconds between hops. default 5"
        required: false
        default: "5"
      controller_label:
        description: "controller lock label for writeback PR creation (optional)"
        required: false
        default: ""
      expected_controller_label:
        description: "exact expected controller label (optional)"
        required: false
        default: ""
      resume_token:
        description: "resume tracking token from loop entry (optional)"
        required: false
        default: ""
concurrency:
  group: mep-loop-engine-v2
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
  pull-requests: write
jobs:
  zone:
    runs-on: ubuntu-latest
    env:
      MEP_CONTROLLER_LABEL: ${{ github.event.inputs.controller_label }}
      MEP_EXPECTED_CONTROLLER_LABEL: ${{ github.event.inputs.expected_controller_label }}
      MEP_LOOP_RESUME_TOKEN: ${{ github.event.inputs.resume_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Emit MEP_COPYPASTE_ZONE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .mep
          echo "===== MEP_COPYPASTE_ZONE BEGIN ====="
          echo "RESTART_PACKET"
          echo "RUN_STATE_CODE=RUNNING"
          echo "MODE=CANONICAL_LOOP_ENGINE_V2"
          echo "ITER=${{ inputs.iter }}"
          echo "MAX_ITER=${{ inputs.max_iter }}"
          echo "SLEEP_SECONDS=${{ inputs.sleep_seconds }}"
          echo "REPO_ORIGIN=https://github.com/${GITHUB_REPOSITORY}"
          echo "BRANCH=${GITHUB_REF_NAME}"
          echo "HEAD_SHA=${GITHUB_SHA}"
          echo "RESUME_TOKEN=${{ inputs.resume_token }}"
          echo "NEXT_ACTION=SSOT_SCAN"
          echo "===== MEP_COPYPASTE_ZONE END ====="
          cat > .mep/RESTART_PACKET.txt <<EOF
          MODE=CANONICAL_LOOP_ENGINE_V2
          ITER=${{ inputs.iter }}
          MAX_ITER=${{ inputs.max_iter }}
          SLEEP_SECONDS=${{ inputs.sleep_seconds }}
          REPO_ORIGIN=https://github.com/${GITHUB_REPOSITORY}
          BRANCH=${GITHUB_REF_NAME}
          HEAD_SHA=${GITHUB_SHA}
          RESUME_TOKEN=${{ inputs.resume_token }}
          CURRENT_PHASE=SSOT_SCAN
          NEXT_ACTION=SSOT_SCAN
          RUN_STATE_PATH=mep/run_state.json
          EOF
          python3 tools/mep_loop_state.py \
            --phase SSOT_SCAN \
            --phase-status PENDING \
            --next-action SSOT_SCAN \
            --reason-code LOOP_ENGINE_STARTED \
            --outcome START \
            --iter "${{ inputs.iter }}" \
            --max-iter "${{ inputs.max_iter }}" \
            --sleep-seconds "${{ inputs.sleep_seconds }}" \
            --compile-docs
      - name: SSOT_SCAN (tool)
        shell: bash
        run: |
          set -euo pipefail
          status=0
          python3 tools/checks/ssot_scan.py docs/MEP/MEP_SSOT_MASTER.md > .mep/ssot_scan.json || status=$?
          cat .mep/ssot_scan.json
          python3 - <<'PY'
          import hashlib, json, re
          from pathlib import Path
          ssot_path = Path("docs/MEP/MEP_SSOT_MASTER.md")
          result_path = Path(".mep/ssot_scan.json")
          data = json.loads(result_path.read_text(encoding="utf-8"))
          text = ssot_path.read_text(encoding="utf-8", errors="replace")
          match = re.search(r"v[0-9]+\.[0-9]+\.[0-9]+\+[^\s]+", text)
          findings = data.get("findings") or []
          data["ssot_hash"] = hashlib.sha256(text.encode("utf-8")).hexdigest()
          data["ssot_version"] = match.group(0) if match else "(unknown)"
          data["reason_code"] = findings[0].get("type") if findings else None
          result_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"SSOT_SCAN_STATUS={data.get('ssot_scan_status')}")
          print(f"SSOT_PATH={data.get('ssot_path')}")
          print(f"SSOT_HASH={data.get('ssot_hash')}")
          print(f"SSOT_VERSION={data.get('ssot_version')}")
          print(f"SSOT_REASON={data.get('reason_code') or 'NONE'}")
          PY
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.mep/ssot_scan.json').read_text(encoding='utf-8'))
          with Path('.mep/RESTART_PACKET.txt').open('a', encoding='utf-8') as fh:
              fh.write(f"SSOT_SCAN_STATUS={data.get('ssot_scan_status')}\n")
              fh.write(f"SSOT_PATH={data.get('ssot_path')}\n")
              fh.write(f"SSOT_HASH={data.get('ssot_hash')}\n")
              fh.write(f"SSOT_VERSION={data.get('ssot_version')}\n")
              fh.write(f"SSOT_REASON={data.get('reason_code') or 'NONE'}\n")
              fh.write("NEXT_ACTION=CONFLICT_SCAN\n")
          PY
          phase_status="$(python3 -c "import json; print(json.load(open('.mep/ssot_scan.json', encoding='utf-8')).get('ssot_scan_status', 'UNKNOWN'))")"
          reason_code="$(python3 -c "import json; d=json.load(open('.mep/ssot_scan.json', encoding='utf-8')); print(d.get('reason_code') or ('SSOT_SCAN_OK' if d.get('ssot_scan_status') == 'GO' else 'SSOT_SCAN_STOP'))")"
          next_action="CONFLICT_SCAN"
          outcome="OK"
          stop_class=""
          if [ "$status" -ne 0 ]; then
            next_action="SSOT_SCAN"
            outcome="STOP"
            stop_class="HARD"
            python3 - <<'PY'
            import json
            from pathlib import Path
            data = json.loads(Path('.mep/ssot_scan.json').read_text(encoding='utf-8'))
            reason = data.get('reason_code') or 'SSOT_SCAN_STOP'
            print(f"::error::STOP_HARD: {reason}")
            PY
          fi
          python3 tools/mep_loop_state.py \
            --phase SSOT_SCAN \
            --phase-status "$phase_status" \
            --next-action "$next_action" \
            --reason-code "$reason_code" \
            --outcome "$outcome" \
            --stop-class "$stop_class" \
            --phase-result-path .mep/ssot_scan.json \
            --iter "${{ inputs.iter }}" \
            --max-iter "${{ inputs.max_iter }}" \
            --sleep-seconds "${{ inputs.sleep_seconds }}" \
            --compile-docs
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
      - name: CONFLICT_SCAN (tool)
        shell: bash
        run: |
          set -euo pipefail
          base_ref="HEAD^"
          if ! git rev-parse "$base_ref" >/dev/null 2>&1; then
            base_ref="HEAD"
          fi
          status=0
          python3 tools/checks/conflict_scan.py "$base_ref" HEAD > .mep/conflict_scan.json || status=$?
          cat .mep/conflict_scan.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          result_path = Path('.mep/conflict_scan.json')
          data = json.loads(result_path.read_text(encoding='utf-8'))
          data['conflictStatus'] = 'STOP' if data.get('conflictDetected') else 'GO'
          data['reason_code'] = data.get('conflictReason')
          result_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding='utf-8')
          print(f"CONFLICT_SCAN_STATUS={data.get('conflictStatus')}")
          print(f"CONFLICT_REASON={data.get('reason_code') or 'NONE'}")
          print(f"CONFLICT_DIFF_BASE={data.get('diffBase')}")
          print(f"CONFLICT_DIFF_HEAD={data.get('diffHead')}")
          PY
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.mep/conflict_scan.json').read_text(encoding='utf-8'))
          with Path('.mep/RESTART_PACKET.txt').open('a', encoding='utf-8') as fh:
              fh.write(f"CONFLICT_SCAN_STATUS={data.get('conflictStatus')}\n")
              fh.write(f"CONFLICT_REASON={data.get('reason_code') or 'NONE'}\n")
              fh.write(f"CONFLICT_DIFF_BASE={data.get('diffBase')}\n")
              fh.write(f"CONFLICT_DIFF_HEAD={data.get('diffHead')}\n")
              fh.write("NEXT_ACTION=EXTRACT_GENERATE\n")
          PY
          phase_status="$(python3 -c "import json; print(json.load(open('.mep/conflict_scan.json', encoding='utf-8')).get('conflictStatus', 'UNKNOWN'))")"
          reason_code="$(python3 -c "import json; d=json.load(open('.mep/conflict_scan.json', encoding='utf-8')); print(d.get('reason_code') or ('CONFLICT_SCAN_OK' if d.get('conflictStatus') == 'GO' else 'CONFLICT_SCAN_STOP'))")"
          next_action="EXTRACT_GENERATE"
          outcome="OK"
          stop_class=""
          if [ "$status" -ne 0 ]; then
            next_action="CONFLICT_SCAN"
            outcome="STOP"
            stop_class="HARD"
            python3 - <<'PY'
            import json
            from pathlib import Path
            data = json.loads(Path('.mep/conflict_scan.json').read_text(encoding='utf-8'))
            reason = data.get('reason_code') or 'CONFLICT_SCAN_STOP'
            print(f"::error::STOP_HARD: {reason}")
            PY
          fi
          python3 tools/mep_loop_state.py \
            --phase CONFLICT_SCAN \
            --phase-status "$phase_status" \
            --next-action "$next_action" \
            --reason-code "$reason_code" \
            --outcome "$outcome" \
            --stop-class "$stop_class" \
            --phase-result-path .mep/conflict_scan.json \
            --iter "${{ inputs.iter }}" \
            --max-iter "${{ inputs.max_iter }}" \
            --sleep-seconds "${{ inputs.sleep_seconds }}" \
            --compile-docs
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
      - name: EXTRACT_GENERATE (tool)
        shell: bash
        run: |
          set -euo pipefail
          status=0
          python3 tools/extract/extract_generate.py > .mep/extract_generate.log || status=$?
          cat .mep/extract_generate.log
          python3 - "$status" <<'PY'
          import json
          import sys
          from pathlib import Path
          status = int(sys.argv[1])
          expected = [
              'docs/MEP/EXTRACT/HEALTH.md',
              'docs/MEP/EXTRACT/DECISION_LEDGER.md',
              'docs/MEP/EXTRACT/INPUT_PACKET.md',
              'docs/MEP/EXTRACT/CARDS.md',
          ]
          payload = {}
          for raw_line in Path('.mep/extract_generate.log').read_text(encoding='utf-8').splitlines():
              line = raw_line.strip()
              if not line.startswith('{'):
                  continue
              try:
                  payload = json.loads(line)
                  break
              except json.JSONDecodeError:
                  continue
          mode = payload.get('mode') or 'unknown'
          missing = [p for p in expected if not Path(p).exists()]
          reason = None
          if status != 0:
              reason = 'EXTRACT_GENERATE_STOP'
          elif mode != 'write':
              reason = 'EXTRACT_MODE_NOT_WRITE'
          elif missing:
              reason = 'EXTRACT_OUTPUT_MISSING'
          data = {
              'extract_status': 'GO' if reason is None else 'STOP',
              'reason_code': reason,
              'mode': mode,
              'run_state_path': payload.get('run_state_path') or 'mep/run_state.json',
              'out_dir': payload.get('out_dir') or 'docs/MEP/EXTRACT',
              'generated_files': payload.get('files') or expected,
              'existing_files': [p for p in expected if Path(p).exists()],
              'missing_files': missing,
              'log_path': '.mep/extract_generate.log',
          }
          Path('.mep/extract_result.json').write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding='utf-8')
          print(f"EXTRACT_STATUS={data.get('extract_status')}")
          print(f"EXTRACT_MODE={data.get('mode')}")
          print(f"EXTRACT_OUT_DIR={data.get('out_dir')}")
          print('EXTRACT_POINTERS=' + ','.join(data.get('generated_files') or expected))
          PY
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.mep/extract_result.json').read_text(encoding='utf-8'))
          with Path('.mep/RESTART_PACKET.txt').open('a', encoding='utf-8') as fh:
              fh.write(f"EXTRACT_STATUS={data.get('extract_status')}\n")
              fh.write(f"EXTRACT_MODE={data.get('mode')}\n")
              fh.write(f"EXTRACT_OUT_DIR={data.get('out_dir')}\n")
              fh.write('EXTRACT_POINTERS=' + ','.join(data.get('generated_files') or []) + '\n')
              fh.write("NEXT_ACTION=WRITEBACK_PREFLIGHT\n")
          PY
          phase_status="$(python3 -c "import json; print(json.load(open('.mep/extract_result.json', encoding='utf-8')).get('extract_status', 'UNKNOWN'))")"
          reason_code="$(python3 -c "import json; d=json.load(open('.mep/extract_result.json', encoding='utf-8')); print(d.get('reason_code') or ('EXTRACT_WRITE_OK' if d.get('extract_status') == 'GO' else 'EXTRACT_GENERATE_STOP'))")"
          next_action="WRITEBACK_PREFLIGHT"
          outcome="OK"
          stop_class=""
          if [ "$status" -ne 0 ] || [ "$phase_status" != "GO" ]; then
            next_action="EXTRACT_GENERATE"
            outcome="STOP"
            stop_class="HARD"
            echo "::error::STOP_HARD: $reason_code"
          fi
          python3 tools/mep_loop_state.py \
            --phase EXTRACT_GENERATE \
            --phase-status "$phase_status" \
            --next-action "$next_action" \
            --reason-code "$reason_code" \
            --outcome "$outcome" \
            --stop-class "$stop_class" \
            --phase-result-path .mep/extract_result.json \
            --iter "${{ inputs.iter }}" \
            --max-iter "${{ inputs.max_iter }}" \
            --sleep-seconds "${{ inputs.sleep_seconds }}" \
            --compile-docs
          if [ "$status" -ne 0 ] || [ "$phase_status" != "GO" ]; then
            exit 1
          fi
      - name: WRITEBACK_PREFLIGHT (phase3 step1)
        shell: bash
        run: |
          set -euo pipefail
          status=0
          python3 - <<'PY' || status=$?
          import json
          import re
          import sys
          from pathlib import Path

          version_re = re.compile(r'v[0-9]+\.[0-9]+\.[0-9]+\+[^\s]+')
          parent = Path('docs/MEP/MEP_BUNDLE.md')
          evidence = Path('docs/MEP_SUB/EVIDENCE/MEP_BUNDLE.md')
          extract_outputs = [
              'docs/MEP/EXTRACT/HEALTH.md',
              'docs/MEP/EXTRACT/DECISION_LEDGER.md',
              'docs/MEP/EXTRACT/INPUT_PACKET.md',
              'docs/MEP/EXTRACT/CARDS.md',
          ]
          result = {
              'status': 'GO',
              'reason_code': 'WRITEBACK_PREFLIGHT_OK',
              'parent_bundle': parent.as_posix(),
              'evidence_bundle': evidence.as_posix(),
              'extract_outputs': extract_outputs,
              'missing_extract_outputs': [],
              'parent_bundle_version': '',
              'evidence_bundle_version': '',
          }
          if not parent.exists():
              result['status'] = 'STOP'
              result['reason_code'] = 'WRITEBACK_PARENT_BUNDLE_MISSING'
          elif not evidence.exists():
              result['status'] = 'STOP'
              result['reason_code'] = 'WRITEBACK_EVIDENCE_BUNDLE_MISSING'
          else:
              parent_text = parent.read_text(encoding='utf-8', errors='replace')
              evidence_text = evidence.read_text(encoding='utf-8', errors='replace')
              parent_match = version_re.search(parent_text)
              evidence_match = version_re.search(evidence_text)
              result['parent_bundle_version'] = parent_match.group(0) if parent_match else ''
              result['evidence_bundle_version'] = evidence_match.group(0) if evidence_match else ''
              result['missing_extract_outputs'] = [path for path in extract_outputs if not Path(path).exists()]
              if result['missing_extract_outputs']:
                  result['status'] = 'STOP'
                  result['reason_code'] = 'WRITEBACK_EXTRACT_OUTPUT_MISSING'
          Path('.mep/writeback_preflight.json').write_text(json.dumps(result, ensure_ascii=False, indent=2) + "\n", encoding='utf-8')
          print(json.dumps(result, ensure_ascii=False))
          sys.exit(0 if result['status'] == 'GO' else 1)
          PY
          cat .mep/writeback_preflight.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.mep/writeback_preflight.json').read_text(encoding='utf-8'))
          with Path('.mep/RESTART_PACKET.txt').open('a', encoding='utf-8') as fh:
              fh.write(f"WRITEBACK_PREFLIGHT_STATUS={data.get('status')}\n")
              fh.write(f"WRITEBACK_PREFLIGHT_REASON={data.get('reason_code')}\n")
              fh.write('WRITEBACK_EXTRACT_OUTPUTS=' + ','.join(data.get('extract_outputs') or []) + '\n')
              fh.write('WRITEBACK_MISSING_OUTPUTS=' + ','.join(data.get('missing_extract_outputs') or []) + '\n')
              fh.write("NEXT_ACTION=PHASE3_WRITEBACK_BUNDLE\n")
          PY
          reason_code="$(python3 -c "import json; print(json.load(open('.mep/writeback_preflight.json', encoding='utf-8')).get('reason_code', 'WRITEBACK_PREFLIGHT_STOP'))")"
          next_action="PHASE3_WRITEBACK_BUNDLE"
          outcome="OK"
          stop_class=""
          phase_status="GO"
          if [ "$status" -ne 0 ]; then
            next_action="WRITEBACK_PREFLIGHT"
            outcome="STOP"
            stop_class="HARD"
            phase_status="STOP"
            echo "::error::STOP_HARD: $reason_code"
          fi
          python3 tools/mep_loop_state.py \
            --phase WRITEBACK_PREFLIGHT \
            --phase-status "$phase_status" \
            --next-action "$next_action" \
            --reason-code "$reason_code" \
            --outcome "$outcome" \
            --stop-class "$stop_class" \
            --phase-result-path .mep/writeback_preflight.json \
            --iter "${{ inputs.iter }}" \
            --max-iter "${{ inputs.max_iter }}" \
            --sleep-seconds "${{ inputs.sleep_seconds }}" \
            --compile-docs
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
      - name: PHASE3_WRITEBACK_BUNDLE
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $reason = "PHASE3_WRITEBACK_BUNDLE_OK"
          $phaseStatus = "GO"
          $nextAction = "PHASE3_CREATE_PR"
          $outcome = "OK"
          $stopClass = ""
          try {
            Write-Host "PHASE3_WRITEBACK_BUNDLE_START"
            if(-not (Test-Path -LiteralPath "tools/mep_writeback_bundle.ps1")){ throw "missing tools/mep_writeback_bundle.ps1" }
            ./tools/mep_writeback_bundle.ps1 -AdditionalPaths @(
              'docs/MEP/EXTRACT/HEALTH.md',
              'docs/MEP/EXTRACT/DECISION_LEDGER.md',
              'docs/MEP/EXTRACT/INPUT_PACKET.md',
              'docs/MEP/EXTRACT/CARDS.md'
            )
            Write-Host "PHASE3_WRITEBACK_BUNDLE_OK"
          } catch {
            $reason = [string]$_.Exception.Message
            $phaseStatus = "STOP"
            $nextAction = "PHASE3_WRITEBACK_BUNDLE"
            $outcome = "STOP"
            $stopClass = "HARD"
          }
          @{ status=$phaseStatus; reason_code=$reason; bundle_path='docs/MEP/MEP_BUNDLE.md'; extract_outputs=@('docs/MEP/EXTRACT/HEALTH.md','docs/MEP/EXTRACT/DECISION_LEDGER.md','docs/MEP/EXTRACT/INPUT_PACKET.md','docs/MEP/EXTRACT/CARDS.md') } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath .mep/writeback_bundle.json -Encoding UTF8
          python tools/mep_loop_state.py --phase PHASE3_WRITEBACK_BUNDLE --phase-status $phaseStatus --next-action $nextAction --reason-code $reason --outcome $outcome --stop-class $stopClass --phase-result-path .mep/writeback_bundle.json --iter "${{ inputs.iter }}" --max-iter "${{ inputs.max_iter }}" --sleep-seconds "${{ inputs.sleep_seconds }}" --compile-docs
          if($stopClass){ throw $reason }
      - name: PHASE3_CREATE_PR
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MEP_CONTROLLER_LABEL: ${{ github.event.inputs.controller_label }}
          MEP_EXPECTED_CONTROLLER_LABEL: ${{ github.event.inputs.expected_controller_label }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $reason = "PHASE3_CREATE_PR_NOOP"
          $phaseStatus = "NOOP"
          $nextAction = "ALL_DONE"
          $outcome = "OK"
          $stopClass = ""
          $prUrl = ""
          try {
            $porc = (git status --porcelain | Out-String).Trim()
            if([string]::IsNullOrWhiteSpace($porc)){
              Write-Host "PHASE3_CREATE_PR_NOOP (no changes)"
            } else {
              Write-Host "PHASE3_CREATE_PR_START"
              if(-not (Test-Path -LiteralPath "tools/mep_writeback_create_pr.ps1")){ throw "missing tools/mep_writeback_create_pr.ps1" }
              ./tools/mep_writeback_create_pr.ps1 -BundlePath docs/MEP/MEP_BUNDLE.md -AdditionalPaths @('docs/MEP/EXTRACT/HEALTH.md','docs/MEP/EXTRACT/DECISION_LEDGER.md','docs/MEP/EXTRACT/INPUT_PACKET.md','docs/MEP/EXTRACT/CARDS.md')
              $head = (git rev-parse --abbrev-ref HEAD | Out-String).Trim()
              if(-not [string]::IsNullOrWhiteSpace($head)){
                try {
                  $prUrl = (gh pr list --state open --head $head --json url --jq '.[0].url' 2>$null | Out-String).Trim()
                } catch {
                  $prUrl = ""
                }
              }
              if([string]::IsNullOrWhiteSpace($prUrl)){
                $reason = "WRITEBACK_PR_URL_UNAVAILABLE"
                $phaseStatus = "WAIT"
                $nextAction = "PHASE3_CREATE_PR"
                $outcome = "WAIT"
                $stopClass = "WAIT"
              } else {
                $reason = "WRITEBACK_PR_CREATED"
                $phaseStatus = "WAIT"
                $nextAction = "WAIT_PR_CHECKS"
                $outcome = "OK"
                $stopClass = ""
              }
              Write-Host "PHASE3_CREATE_PR_OK"
            }
          } catch {
            $reason = [string]$_.Exception.Message
            $phaseStatus = "STOP"
            $nextAction = "PHASE3_CREATE_PR"
            $outcome = "STOP"
            $stopClass = "HARD"
          }
          @{ status=$phaseStatus; reason_code=$reason; pr_url=$prUrl; workflow_run_url=("https://github.com/{0}/actions/runs/{1}" -f $env:GITHUB_REPOSITORY,$env:GITHUB_RUN_ID); extract_outputs=@('docs/MEP/EXTRACT/HEALTH.md','docs/MEP/EXTRACT/DECISION_LEDGER.md','docs/MEP/EXTRACT/INPUT_PACKET.md','docs/MEP/EXTRACT/CARDS.md') } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath .mep/create_pr.json -Encoding UTF8
          python tools/mep_loop_state.py --phase PHASE3_CREATE_PR --phase-status $phaseStatus --next-action $nextAction --reason-code $reason --outcome $outcome --stop-class $stopClass --phase-result-path .mep/create_pr.json --pr-url $prUrl --iter "${{ inputs.iter }}" --max-iter "${{ inputs.max_iter }}" --sleep-seconds "${{ inputs.sleep_seconds }}" --compile-docs
          if($stopClass -eq 'HARD'){ throw $reason }
      - name: Publish loop phase pointers
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          phase_files = {
              'SSOT_SCAN': Path('.mep/ssot_scan.json'),
              'CONFLICT_SCAN': Path('.mep/conflict_scan.json'),
              'EXTRACT': Path('.mep/extract_result.json'),
              'WRITEBACK_PREFLIGHT': Path('.mep/writeback_preflight.json'),
              'PHASE3_WRITEBACK_BUNDLE': Path('.mep/writeback_bundle.json'),
              'PHASE3_CREATE_PR': Path('.mep/create_pr.json'),
          }
          pointers = {
              'phase_files': {name: path.as_posix() for name, path in phase_files.items()},
              'restart_packet': '.mep/RESTART_PACKET.txt',
              'run_state_path': 'mep/run_state.json',
              'summary_path': '.mep/phase_summary.md',
          }
          rows = ['# Loop engine phase pointers', '', '| Phase | Status | Pointer | Note |', '| --- | --- | --- | --- |']
          for name, path in phase_files.items():
              if not path.exists():
                  rows.append(f'| {name} | SKIPPED | `{path.as_posix()}` | file not generated |')
                  continue
              data = json.loads(path.read_text(encoding='utf-8'))
              status = data.get('status') or data.get('phase_status') or data.get('ssot_scan_status') or data.get('conflictStatus') or data.get('extract_status') or 'UNKNOWN'
              note = data.get('reason_code') or data.get('conflictDetails') or data.get('ssot_path') or data.get('out_dir') or ''
              rows.append(f'| {name} | {status} | `{path.as_posix()}` | {note} |')
          summary = "\n".join(rows) + "\n"
          Path('.mep/phase_summary.md').write_text(summary, encoding='utf-8')
          Path('.mep/loop_phase_pointers.json').write_text(json.dumps(pointers, ensure_ascii=False, indent=2) + "\n", encoding='utf-8')
          with Path('.mep/RESTART_PACKET.txt').open('a', encoding='utf-8') as fh:
              fh.write('PHASE_POINTERS_JSON=.mep/loop_phase_pointers.json\n')
              fh.write('PHASE_SUMMARY=.mep/phase_summary.md\n')
              fh.write('RUN_STATE_PATH=mep/run_state.json\n')
              fh.write('STATUS_PATH=docs/MEP/STATUS.md\n')
              fh.write('HANDOFF_AUDIT_PATH=docs/MEP/HANDOFF_AUDIT.md\n')
              fh.write('HANDOFF_WORK_PATH=docs/MEP/HANDOFF_WORK.md\n')
          step_summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if step_summary:
              with open(step_summary, 'a', encoding='utf-8') as fh:
                  fh.write(summary)
          print(summary)
          PY
      - name: Upload RESTART_PACKET
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restart-packet
          path: .mep/RESTART_PACKET.txt
          if-no-files-found: error
      - name: Upload loop phase pointers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-phase-pointers
          path: |
            .mep/ssot_scan.json
            .mep/conflict_scan.json
            .mep/extract_result.json
            .mep/writeback_preflight.json
            .mep/writeback_bundle.json
            .mep/create_pr.json
            .mep/loop_phase_pointers.json
            .mep/phase_summary.md
            .mep/extract_generate.log
            mep/run_state.json
            docs/MEP/STATUS.md
            docs/MEP/HANDOFF_AUDIT.md
            docs/MEP/HANDOFF_WORK.md
            docs/MEP/EXTRACT/HEALTH.md
            docs/MEP/EXTRACT/DECISION_LEDGER.md
            docs/MEP/EXTRACT/INPUT_PACKET.md
            docs/MEP/EXTRACT/CARDS.md
          if-no-files-found: warn
      - name: Smoke
        run: echo "ENGINE_V2_RUN_STATE_OK"
