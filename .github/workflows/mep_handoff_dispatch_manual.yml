name: mep_handoff_dispatch_manual [SEALED]

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy manual handoff entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Legacy manual handoff entry is sealed.',
              '',
              '- This workflow is a non-canonical path.',
              '- Do not use this entry for active main operations.',
              '- Workflow: .github/workflows/mep_handoff_dispatch_manual.yml'
            ].join('\n');
            await core.summary
              .addHeading('SEALED_WORKFLOW')
              .addRaw(body, true)
              .write();
            core.setFailed('SEALED_WORKFLOW: legacy manual handoff entry is sealed');
