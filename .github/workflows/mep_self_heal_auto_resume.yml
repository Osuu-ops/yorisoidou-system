name: MEP Self-Heal Auto Resume
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
  actions: read
jobs:
  auto_resume:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (pyyaml)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Auto-resume from SSOT (run_state)
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python tools/self_heal/auto_resume.py
