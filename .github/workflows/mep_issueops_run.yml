# registry-refresh: FIX_ISSUEOPS_GIT_IDENTITY_AND_CONTENTS_WRITE
name: MEP IssueOps Run (Issue Comment)
on:
  issue_comment:
    types: [created]
permissions:
  contents: read
  issues: write
  actions: write
jobs:
  run:
    if: contains(github.event.comment.body, '/mep run')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Resolve lane (strict, no implicit fallback)
        id: lane
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _tmp
          gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}" > _tmp/issue.json

          if ! lane="$(python3 tools/mep_resolve_lane.py --issue-json-path _tmp/issue.json 2>_tmp/lane.err)"; then
            err="$(tr '\n' ' ' < _tmp/lane.err | sed -E 's/[[:space:]]+/ /g;s/^ //;s/ $//')"
            body="[MEP][STRICT_ISSUE_EVENT] STOP_HARD\n\nSTOP_REASON: LANE_UNRESOLVED\nDETAIL: ${err}\n\nAction:\n- Add exactly one label: mep-biz or mep-system\n- Or run canonical standalone workflow with explicit lane:\n  .github/workflows/mep_standalone_autoloop_dispatch.yml"
            gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}/comments" -f body="${body}" >/dev/null || true
            exit 1
          fi

          echo "lane=${lane}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch canonical standalone workflow
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          LANE: ${{ steps.lane.outputs.lane }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Dispatching canonical standalone workflow for issue #${ISSUE_NUMBER} lane=${LANE}"
          gh workflow run ".github/workflows/mep_standalone_autoloop_dispatch.yml" --ref main \
            -f issue_number="${ISSUE_NUMBER}" \
            -f lane="${LANE}"
concurrency:
  group: mep-issueops-issue-${{ github.event.issue.number }}
  cancel-in-progress: false
