name: MEP Auto-Trigger Next Cycle (Writeback Close)
on:
  pull_request:
    types: [closed]
permissions:
  issues: write
  pull-requests: read
  contents: read
jobs:
  trigger:
    if: startsWith(github.event.pull_request.title, 'Writeback bundle evidence')
    runs-on: ubuntu-latest
    steps:
      - name: Post /mep run (idempotent; merged or closed)
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: "2400"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGED: ${{ github.event.pull_request.merged }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${MERGED}" = "true" ] && [ -n "${MERGE_SHA}" ]; then
            key="AUTO_TRIGGER_WRITEBACK_MERGE:${MERGE_SHA}"
            reason="writeback_merged"
          else
            key="AUTO_TRIGGER_WRITEBACK_CLOSED:${PR_NUMBER}:${HEAD_SHA}"
            reason="writeback_closed_not_merged"
          fi
          echo "[INFO] key=${key} reason=${reason}"
          already="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments?per_page=200&sort=created&direction=desc" --jq "[.[].body | select(. != null) | select(test(\"${key}\"))] | length")"
          if [ "${already}" != "0" ]; then
            echo "[INFO] already posted (count=${already}) -> skip"
            exit 0
          fi
          body=$'/mep run\n\n[MEP][AUTO_TRIGGER]\n'"${key}"$'\nreason='"${reason}"$'\n'
          gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -X POST -f body="${body}" >/dev/null
          echo "[OK] posted /mep run with key"