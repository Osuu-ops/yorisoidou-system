name: mep_handoff_repo_dispatch_v7 [SEALED]

on:
  repository_dispatch:
    types: [mep_handoff_v7]

permissions:
  contents: read

jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy repo handoff entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Legacy repo handoff entry is sealed.',
              '',
              '- This workflow is a non-canonical path.',
              '- Do not use this entry for active main operations.',
              '- Workflow: .github/workflows/mep_handoff_repo_dispatch_v7.yml'
            ].join('\n');
            await core.summary
              .addHeading('SEALED_WORKFLOW')
              .addRaw(body, true)
              .write();
            core.setFailed('SEALED_WORKFLOW: legacy repo handoff entry is sealed');
