name: MEP Standalone AutoLoop (Dispatch)
run-name: >-
  MEP Standalone AutoLoop (Dispatch) / issue #${{ inputs.issue_number || github.event.inputs.issue_number || 'n/a' }} / lane ${{ inputs.lane || github.event.inputs.lane || 'AUTO' }}
on:
  workflow_call:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string
    secrets:
      MEP_BOT_PAT:
        required: false
      MEP_PR_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string
permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write
jobs:
  call-v2:
    uses: ./.github/workflows/mep_standalone_autoloop_dispatch_v2.yml
    secrets: inherit
    with:
      issue_number: ${{ inputs.issue_number || github.event.inputs.issue_number }}
      lane: ${{ inputs.lane || github.event.inputs.lane || '' }}
