# registry-refresh: GATE0_NEXT_ACTION_DRIVER
name: MEP Gate0 Unified Entry
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  actions: write
jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: Runner Status (refresh state)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          python tools/runner/runner.py status
      - name: Execute next_action (single step)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          RUN_STATUS="$(python -c 'import json;print(json.load(open("mep/run_state.json")).get("run_status",""))')"
          NEXT_ACTION="$(python -c 'import json;print(json.load(open("mep/run_state.json")).get("next_action",""))')"
          RID="$(python -c 'import json;print(json.load(open("mep/run_state.json"))["run_id"])')"
          echo "RUN_STATUS=${RUN_STATUS}"
          echo "NEXT_ACTION=${NEXT_ACTION}"
          echo "RUN_ID=${RID}"
          # already done -> noop success
          if [ "${RUN_STATUS}" = "DONE" ] || [ "${NEXT_ACTION}" = "ALL_DONE" ]; then
            echo "[Gate0] already DONE"
            exit 0
          fi
          case "${NEXT_ACTION}" in
            READY_TO_APPLY_SAFE_PATH)
              python tools/runner/runner.py apply-safe --run-id "${RID}"
              ;;
            MERGE_FINISH)
              python tools/runner/runner.py merge-finish --run-id "${RID}"
              ;;
            STATUS)
              # status already executed above; treat as noop
              echo "[Gate0] STATUS noop"
              ;;
            *)
              echo "::error::Unsupported NEXT_ACTION=${NEXT_ACTION}"
              exit 2
              ;;
          esac