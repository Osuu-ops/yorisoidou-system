name: workflow-lint
on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: rhysd/actionlint@v1.7.11

