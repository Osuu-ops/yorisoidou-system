name: mep_scope_fence_guard_pr
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
  issues: read
jobs:
  scope-fence:
    runs-on: ubuntu-latest
    steps:
      - name: Controller Lock (label required)
        if: ${{ startsWith(github.event_name, 'pull_request') }}
        uses: actions/github-script@v7
        with:
          script: |

            const pr = context.payload.pull_request;

            if (!pr || !pr.number) {

              core.setFailed("PR_CONTROLLER_LOCK_UNREADABLE: pull_request payload missing.");

              return;

            }

            const { owner, repo } = context.repo;

            const issue_number = pr.number;

            const res = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });

            const labels = (res.data || []).map(l => l.name || "");

            const controllers = labels.filter(n => n.startsWith("mep:controller="));
const hasAny = controllers.length > 0;
const hasPlaceholder = controllers.some(n => n === "mep:controller=CHAT");
const hasReal = controllers.some(n => n !== "mep:controller=CHAT" && n.length > "mep:controller=".length);
if (!hasAny) {
  core.setFailed("PR_CONTROLLER_LOCK_MISSING: add label mep:controller=<CONTROLLER_ID> before merge.");
} else if (hasPlaceholder || !hasReal) {
  core.setFailed("PR_CONTROLLER_LOCK_INVALID: placeholder 'mep:controller=CHAT' is forbidden. Use a concrete id (e.g., mep:controller=PC).");
}- name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard (diff to origin/main)
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/mep_scope_fence_guard.ps1 -Mode diff -BaseRef origin/main
