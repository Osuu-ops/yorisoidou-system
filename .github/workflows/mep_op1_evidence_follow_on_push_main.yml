name: OP1_EVIDENCE_FOLLOW_ON_MAIN
on:
  push:
    branches: [main]
permissions:
  actions: write
  contents: read
jobs:
  dispatch:
    name: OP-1 evidence follow (dispatch)
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch canonical writeback workflow
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = '.github/workflows/mep_writeback_bundle_dispatch_entry.yml';
            const { owner, repo } = context.repo;
            const runId = process.env.GITHUB_RUN_ID || '0';
            const controllerLabel = `mep:controller=CHAT_OP1_MAIN_${runId}`;

            async function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function ensureWorkflowActive() {
              const current = await github.rest.actions.getWorkflow({
                owner,
                repo,
                workflow_id,
              });
              let state = current.data?.state || 'unknown';
              core.info(`Workflow ${workflow_id} state=${state}`);
              if (!String(state).startsWith('disabled')) {
                return state;
              }

              core.info(`Enabling ${workflow_id} from state=${state}`);
              await github.rest.actions.enableWorkflow({
                owner,
                repo,
                workflow_id,
              });

              for (let attempt = 1; attempt <= 6; attempt += 1) {
                await sleep(2000);
                const refreshed = await github.rest.actions.getWorkflow({
                  owner,
                  repo,
                  workflow_id,
                });
                state = refreshed.data?.state || 'unknown';
                core.info(`Workflow ${workflow_id} state after enable attempt ${attempt}: ${state}`);
                if (state === 'active') {
                  return state;
                }
              }

              throw new Error(`WORKFLOW_NOT_ACTIVE: ${workflow_id} state=${state}`);
            }

            try {
              await ensureWorkflowActive();
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref: 'main',
                inputs: {
                  pr_number: '0',
                  controller_label: controllerLabel,
                  expected_controller_label: controllerLabel,
                }
              });
              core.info(`Dispatched ${workflow_id} on main with pr_number=0 controller_label=${controllerLabel}`);
            } catch (e) {
              core.setFailed(`Dispatch failed for ${workflow_id}: ${e.message}`);
            }
