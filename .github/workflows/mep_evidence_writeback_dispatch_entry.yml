name: OP-1 Evidence Writeback (Dispatch Entry)
on:
  workflow_dispatch:
permissions:
  actions: write
  contents: read
jobs:
  trigger_op1_target:
    runs-on: ubuntu-latest
steps:
    - name: Controller Lock (label required)
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          if (!pr || !pr.number) {
            core.setFailed("PR_CONTROLLER_LOCK_UNREADABLE: pull_request payload missing.");
            return;
          }
          const { owner, repo } = context.repo;
          const issue_number = pr.number;
          const res = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
          const labels = (res.data || []).map(l => l.name || "");
          const controllers = labels.filter(n => n.startsWith("mep:controller="));
          const hasAny = controllers.length > 0;
          const hasPlaceholder = controllers.some(n => n === "mep:controller=CHAT");
          const hasReal = controllers.some(n => /^mep:controller=CHAT_[A-Za-z0-9_]+$/.test(n));
          if (!hasAny) {
            core.setFailed("PR_CONTROLLER_LOCK_MISSING: add label mep:controller=CHAT_<THIS_CHAT_ID> before writeback.");
          } else if (hasPlaceholder || !hasReal) {
            core.setFailed("PR_CONTROLLER_LOCK_INVALID: placeholder is forbidden. Use mep:controller=CHAT_<THIS_CHAT_ID>.");
          }
      - uses: actions/checkout@v4
      - name: Trigger OP-1 target workflow
        env:
          GH_TOKEN: ${{ secrets.MEP_BOT_PAT }}
        run: |
          gh workflow run mep_evidence_writeback_target_dispatch.yml -r main -f pr_number=0
          set -euo pipefail
          TARGET_WORKFLOW_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows" --jq '
  .workflows
  | map(select((.name|test("Evidence Writeback";"i")) and (.name|test("Entry";"i")|not)))
  | sort_by(.id) | reverse | .[0].id
')"
if [ -z "${TARGET_WORKFLOW_ID}" ] || [ "${TARGET_WORKFLOW_ID}" = "null" ]; then
  echo "[NG] failed to resolve TARGET_WORKFLOW_ID"
  exit 2
fi
echo "TARGET_WORKFLOW_ID=${TARGET_WORKFLOW_ID}"
gh workflow run "${TARGET_WORKFLOW_ID}" -r main
