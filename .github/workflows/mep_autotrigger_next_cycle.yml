name: MEP Auto-Trigger Next Cycle (Writeback Completed)
on:
  workflow_run:
    workflows: ["MEP Writeback Bundle (Entry)"]
    types: [completed]
permissions:
  issues: write
  contents: read
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Debug workflow_run payload + post /mep run (always once per run_id)
        env:
          GH_TOKEN: ${{ secrets.MEP_PR_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: "2400"
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          STATUS: ${{ github.event.workflow_run.status }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_PATH: ${{ github.event.workflow_run.path }}
          EVENT: ${{ github.event.workflow_run.event }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
        shell: bash
        run: |
          set -euo pipefail
          echo "[DEBUG] workflow_run.id=${RUN_ID}"
          echo "[DEBUG] workflow_run.status=${STATUS}"
          echo "[DEBUG] workflow_run.conclusion=${CONCLUSION}"
          echo "[DEBUG] workflow_run.name=${WF_NAME}"
          echo "[DEBUG] workflow_run.path=${WF_PATH}"
          echo "[DEBUG] workflow_run.event=${EVENT}"
          echo "[DEBUG] workflow_run.html_url=${RUN_HTML_URL}"
          # Always post once per RUN_ID (idempotent)
          key="AUTO_TRIGGER_WRITEBACK_RUN:${RUN_ID}"
          echo "[INFO] key=${key}"
          already="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments?per_page=200&sort=created&direction=desc" --jq "[.[].body | select(. != null) | select(test(\"${key}\"))] | length")"
          if [ "${already}" != "0" ]; then
            echo "[INFO] already posted (count=${already}) -> skip"
            exit 0
          fi
          body=$'/mep run\n\n[MEP][AUTO_TRIGGER]\n'"${key}"$'\nreason=writeback_workflow_run_completed\nstatus='"${STATUS}"$'\nconclusion='"${CONCLUSION}"$'\nrun_url='"${RUN_HTML_URL}"$'\n'
          gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -X POST -f body="${body}" >/dev/null
          echo "[OK] posted /mep run with key"