name: mep-merge-finish-poller
"on":
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
permissions:
  issues: write
  pull-requests: read
  contents: read
concurrency:
  group: mep-merge-finish-poller
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll merged intake PRs via search API and post MERGE_FINISH (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          now_epoch="$(date -u +%s)"
          lookback=21600
          cutoff=$((now_epoch - lookback))
          q="repo:${REPO} is:pr is:merged in:title:\"IssueOps intake\" sort:updated-desc"
          urls_path="$(mktemp)"
          # PR API URL を1行ずつ（pagination-safe）
          gh api "search/issues" -f q="$q" --paginate --jq '.items[].pull_request.url' > "$urls_path"
          export URLS_PATH="$urls_path"
          export CUTOFF="$cutoff"
          python3 - <<'PY' 2>&1 | sed -e 's/^/[PYOUT] /'
          import json, os, re, subprocess
          from datetime import datetime, timezone
          repo = os.environ["REPO"]
          run_url = os.environ["RUN_URL"]
          cutoff = int(os.environ.get("CUTOFF","0"))
          urls_path = os.environ["URLS_PATH"]
          def sh(cmd):
              try:
                  return subprocess.check_output(cmd, text=True, stderr=subprocess.STDOUT)
              except subprocess.CalledProcessError as e:
                  print(f"[poll][sh_error] cmd={cmd} rc={e.returncode}")
                  print(e.output)
                  raise
          def iso_to_epoch(iso):
              if not iso:
                  return 0
              iso = iso.replace("Z", "+00:00")
              dt = datetime.fromisoformat(iso).astimezone(timezone.utc)
              return int(dt.timestamp())
          def parse_issue(title, body):
              s = (title or "") + "\n" + (body or "")
              m = re.search(r'\bIssue\s*#\s*(\d+)\b', s, re.IGNORECASE)
              if not m:
                  m = re.search(r'^\s*ISSUE_NUMBER:\s*(\d+)\s*$', s, re.MULTILINE)
              if not m:
                  m = re.search(r'^\s*issue_number:\s*(\d+)\s*$', s, re.MULTILINE)
              return m.group(1) if m else ""
          with open(urls_path, "r", encoding="utf-8") as f:
              urls = [ln.strip() for ln in f.read().splitlines() if ln.strip()]
          posted = 0
          scanned = 0
          exit_code = 0
          try:
              for pr_api_url in urls[:200]:
                  api_path = pr_api_url
                  if api_path.startswith("https://api.github.com/"):
                      api_path = api_path[len("https://api.github.com/"):]
                  try:
                      pr = json.loads(sh(["gh","api",api_path]))
                  except Exception:
                      continue
                  merged_at = pr.get("merged_at")
                  if not merged_at:
                      continue
                  if iso_to_epoch(merged_at) < cutoff:
                      continue
                  head_ref = ((pr.get("head") or {}).get("ref")) or ""
                  if not head_ref.startswith("mep/issueops-run-"):
                      continue
                  scanned += 1
                  title = pr.get("title") or ""
                  body = pr.get("body") or ""
                  pr_url = pr.get("html_url") or ""
                  merge_sha = pr.get("merge_commit_sha") or ""
                  issue = parse_issue(title, body)
                  if not issue:
                      continue
                  # dedupe (last 100) - best-effort
                  try:
                      comments = json.loads(sh(["gh","api",f"repos/{repo}/issues/{issue}/comments?per_page=100"]))
                  except Exception:
                      continue
                  needle1 = "RUN_ID=MERGE_FINISH"
                  needle2 = f"PR_URL={pr_url}"
                  if any((needle1 in (c.get("body") or "")) and (needle2 in (c.get("body") or "")) for c in comments):
                      continue
                  msg = "\n".join([
                      "RUN_ID=MERGE_FINISH",
                      "OUTCOME=PASS",
                      "REASON_CODE=MERGE_FINISH_OK",
                      "NEXT_ACTION=RESTART_PACKET",
                      f"PR_URL={pr_url}",
                      f"MERGE_SHA={merge_sha}",
                      f"EVIDENCE={run_url}",
                  ])
                  try:
                      sh(["gh","api",f"repos/{repo}/issues/{issue}/comments","-f",f"body={msg}"])
                      posted += 1
                  except Exception:
                      pass
          except Exception as e:
              print("[poll][fatal]", repr(e))
              import traceback; traceback.print_exc()
              exit_code = 0  # best-effort success
              # best-effort 継続（exit 0）
          finally:
              print(f"[poll] scanned_merged_intake={scanned} posted={posted}")
              import sys; sys.exit(exit_code)
          PY
