name: MEP 8-Gate Entry (Packet Filter)
on:
  workflow_dispatch:
    inputs:
      packet_path:
        description: "Path to INPUT_PACKET.md"
        required: true
        type: string
permissions:
  issues: write
  contents: read
jobs:
  validate-packet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate INPUT_PACKET contract
        run: |
          python3 tools/validate_input_packet.py "${{ inputs.packet_path }}"
      - name: MEP_GATE1_TO_GATE0_ISSUEOPS_BRIDGE
        if: ${{ false }}
        run: |
          echo "[bridge] disabled (prevent infinite /mep run loop)"

