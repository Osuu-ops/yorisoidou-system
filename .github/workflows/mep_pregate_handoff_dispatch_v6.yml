name: mep_pregate_handoff_dispatch_v6 [SEALED]

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sealed:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy handoff entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '[MEP][SEALED] Legacy handoff entry is sealed.',
              '',
              '- This workflow is a non-canonical path.',
              '- Do not use this entry for active main operations.',
              '- Workflow: .github/workflows/mep_pregate_handoff_dispatch_v6.yml'
            ].join('\n');
            await core.summary
              .addHeading('SEALED_WORKFLOW')
              .addRaw(body, true)
              .write();
            core.setFailed('SEALED_WORKFLOW: legacy handoff entry is sealed');
