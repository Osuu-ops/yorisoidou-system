name: workflow-lint
on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: actionlint (changed workflow files only)
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_BIN="$(go env GOPATH)/bin/actionlint"
          if [ ! -x "${ACTIONLINT_BIN}" ]; then
            go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          fi

          files=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
            && [ -n "${{ github.event.pull_request.base.sha }}" ] \
            && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          else
            mapfile -t files < <(git diff --name-only HEAD~1..HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true)
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow file changes to lint"
            exit 0
          fi

          lint_targets=()
          for f in "${files[@]}"; do
            if [ -f "${f}" ]; then
              lint_targets+=("${f}")
            fi
          done

          if [ "${#lint_targets[@]}" -eq 0 ]; then
            echo "No existing changed workflow files to lint"
            exit 0
          fi

          printf 'Lint targets:\n%s\n' "${lint_targets[*]}"
          "${ACTIONLINT_BIN}" "${lint_targets[@]}"
