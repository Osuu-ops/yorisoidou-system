name: MEP Standalone AutoLoop (Dispatch Entry)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number containing the draft"
        required: true
        type: string
      lane:
        description: "SYSTEM or BUSINESS (optional explicit lane)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  call-canonical:
    uses: ./.github/workflows/mep_standalone_autoloop_dispatch.yml
    secrets: inherit
    with:
      issue_number: ${{ github.event.inputs.issue_number }}
      lane: ${{ github.event.inputs.lane || '' }}
