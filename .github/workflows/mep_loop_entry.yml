name: MEP Loop Entry
run-name: MEP Loop Entry / iter ${{ inputs.iter }} / max ${{ inputs.max_iter }} / token ${{ inputs.resume_token || 'none' }}
on:
  workflow_dispatch:
    inputs:
      iter:
        description: "current iteration (0..)"
        required: false
        default: "0"
      max_iter:
        description: "max iterations (hard stop). default 50"
        required: false
        default: "50"
      sleep_seconds:
        description: "throttle seconds between hops. default 5"
        required: false
        default: "5"
      controller_label:
        description: "controller lock label for downstream writeback (optional)"
        required: false
        default: ""
      expected_controller_label:
        description: "exact expected controller label (optional)"
        required: false
        default: ""
      resume_token:
        description: "resume tracking token for engine run observation (optional)"
        required: false
        default: ""
concurrency:
  group: mep-loop-entry
  cancel-in-progress: false
permissions:
  contents: read
  actions: write
jobs:
  zone:
    runs-on: ubuntu-latest
    steps:
      - name: Emit MEP_COPYPASTE_ZONE
        shell: bash
        run: |
          echo "===== MEP_COPYPASTE_ZONE BEGIN ====="
          echo "RESTART_PACKET"
          echo "RUN_STATE_CODE=RUNNING"
          echo "MODE=DISPATCH_LOOP_ENTRY"
          echo "ITER=${{ inputs.iter }}"
          echo "MAX_ITER=${{ inputs.max_iter }}"
          echo "SLEEP_SECONDS=${{ inputs.sleep_seconds }}"
          echo "REPO_ORIGIN=https://github.com/${GITHUB_REPOSITORY}"
          echo "BRANCH=${GITHUB_REF_NAME}"
          echo "HEAD_SHA=${GITHUB_SHA}"
          echo "RESUME_TOKEN=${{ inputs.resume_token }}"
          echo "NEXT_ACTION=DISPATCH_CANONICAL_ENGINE"
          echo "===== MEP_COPYPASTE_ZONE END ====="
      - name: Throttle
        shell: bash
        run: |
          set -euo pipefail
          S="${{ inputs.sleep_seconds }}"
          if [ -z "${S}" ]; then S="5"; fi
          if [ "${S}" -gt 30 ]; then S="30"; fi
          sleep "${S}"
      - name: Dispatch canonical engine (v2, bounded)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ITER="${{ inputs.iter }}"
          MAX="${{ inputs.max_iter }}"
          if [ -z "${MAX}" ]; then MAX="50"; fi
          if [ "${MAX}" -gt 200 ]; then MAX="200"; fi
          NEXT=$((ITER+1))
          if [ "${NEXT}" -gt "${MAX}" ]; then
            echo "[STOP] reached max_iter: ${MAX}"
            exit 0
          fi
          echo "[GO] dispatch canonical engine: iter=${NEXT}/${MAX}"
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/actions/workflows/mep_loop_engine_v2.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"iter\":\"${NEXT}\",\"max_iter\":\"${MAX}\",\"sleep_seconds\":\"${{ inputs.sleep_seconds }}\",\"controller_label\":\"${{ inputs.controller_label }}\",\"expected_controller_label\":\"${{ inputs.expected_controller_label }}\",\"resume_token\":\"${{ inputs.resume_token }}\"}}"
      - name: Observe dispatched engine run (best effort)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ inputs.resume_token }}
          ENTRY_ITER: ${{ inputs.iter }}
        run: |
          set -euo pipefail
          NEXT=$((ENTRY_ITER+1))
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import time
          from datetime import datetime, timedelta, timezone

          repo = os.environ["REPO"]
          token = os.environ.get("TOKEN", "").strip()
          entry_iter = str(os.environ.get("ENTRY_ITER", "0")).strip()
          try:
              target_iter = str(int(entry_iter) + 1)
          except ValueError:
              target_iter = ""

          def parse_utc(text: str):
              text = (text or "").strip()
              if not text:
                  return None
              try:
                  return datetime.fromisoformat(text.replace("Z", "+00:00"))
              except ValueError:
                  return None

          requested_at = datetime.now(timezone.utc)
          observed = {}
          for _ in range(6):
              proc = subprocess.run(
                  [
                      "gh", "run", "list",
                      "--workflow", ".github/workflows/mep_loop_engine_v2.yml",
                      "--repo", repo,
                      "--json", "databaseId,url,createdAt,event,displayTitle,status",
                      "--limit", "10",
                  ],
                  capture_output=True,
                  text=True,
                  encoding="utf-8",
                  errors="replace",
                  check=False,
              )
              rows = json.loads(proc.stdout or "[]") if proc.returncode == 0 else []
              for row in rows:
                  event = str(row.get("event") or "").strip()
                  if event and event != "workflow_dispatch":
                      continue
                  created_at = parse_utc(str(row.get("createdAt") or ""))
                  if created_at and created_at < (requested_at - timedelta(seconds=15)):
                      continue
                  title = str(row.get("displayTitle") or "").strip()
                  if token:
                      if token not in title:
                          continue
                  elif f"iter {target_iter}" not in title and f"iter={target_iter}" not in title:
                      continue
                  observed = {
                      "run_id": str(row.get("databaseId") or "").strip(),
                      "run_url": str(row.get("url") or "").strip(),
                      "display_title": title,
                      "status": str(row.get("status") or "").strip(),
                  }
                  break
              if observed:
                  break
              time.sleep(2)

          print(f"ENGINE_RUN_ID={observed.get('run_id', '')}")
          print(f"ENGINE_RUN_URL={observed.get('run_url', '')}")
          print(f"ENGINE_RUN_STATUS={observed.get('status', '')}")
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("## Durable Loop Pointers\n")
                  fh.write(f"- resume_token: {token or '(none)'}\n")
                  fh.write(f"- target_iter: {target_iter or '(unknown)'}\n")
                  fh.write(f"- canonical_engine_run_url: {observed.get('run_url', '(unresolved)')}\n")
          PY
