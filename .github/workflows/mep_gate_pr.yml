name: MEP Gate (PR)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: read

jobs:
  gate:
    name: MEP Gate (PR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight (artifacts-only PR => PASS)
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if [ -z "$base" ] || [ -z "$head" ]; then
            echo "ARTIFACTS_ONLY=1" >> "$GITHUB_ENV"
            echo "No PR base/head sha; skip aggregation."
            exit 0
          fi

          files="$(git diff --name-only "$base...$head" || true)"
          if [ -z "$files" ]; then
            echo "ARTIFACTS_ONLY=1" >> "$GITHUB_ENV"
            echo "No changed files; treat as PASS."
            exit 0
          fi

          non_artifacts="$(echo "$files" | grep -vE '^docs/MEP/ARTIFACTS/' || true)"
          if [ -z "$non_artifacts" ]; then
            echo "ARTIFACTS_ONLY=1" >> "$GITHUB_ENV"
            echo "Artifacts-only PR detected; PASS (skip aggregation)."
            exit 0
          fi

          echo "ARTIFACTS_ONLY=0" >> "$GITHUB_ENV"

      - name: Aggregate required check-runs
        if: env.ARTIFACTS_ONLY != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED=(
            "Business Packet Guard (PR)"
            "Text Integrity Guard (PR)"
            "semantic-audit"
            "semantic-audit-business"
          )

          api="repos/${REPO}/commits/${SHA}/check-runs"
          json="$(gh api "$api" -H "Accept: application/vnd.github+json")"
          [ -n "${json}" ] || { echo "::error::Unable to read check-runs"; exit 1; }

          fail=0
          for name in "${REQUIRED[@]}"; do
            concl="$(echo "${json}" | jq -r --arg name "${name}" '
              [.check_runs[]? | select(.name == $name)]
              | sort_by(.completed_at // .started_at // "")
              | if length == 0 then "__MISSING__" else (.[-1].conclusion // "__NO_CONCLUSION__") end
            ')"

            if [ "${concl}" = "__MISSING__" ]; then
              echo "::error::Missing required check-run: $name"
              fail=1
            elif [ "$(printf '%s' "${concl}" | tr '[:upper:]' '[:lower:]')" != "success" ]; then
              echo "::error::Required check-run not successful: $name (conclusion=${concl})"
              fail=1
            else
              echo "OK: $name"
            fi
          done

          if [ "${fail}" -ne 0 ]; then
            echo "::error::MEP Gate FAILED"
            exit 1
          fi

          echo "MEP Gate PASSED"
